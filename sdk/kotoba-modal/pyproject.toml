[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "kotoba-modal"
version = "0.1.0"
description = "Modal-shaped authoring SDK for kotoba nodes — @app.function / .remote() dispatched (py→wasm→kotoba) to the Murakumo Mac mini fleet"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "see kotoba/LICENSE" }
authors = [{ name = "kotoba / kotobase maintainers" }]
keywords = ["kotoba", "modal", "serverless", "inference", "wasm", "murakumo"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: System :: Distributed Computing",
]
# Zero runtime dependencies: HTTP via stdlib urllib, CBOR via the bundled
# _cbor.py codec (standard CBOR, readable by the node's ciborium).
dependencies = []

[project.optional-dependencies]
# py→wasm build toolchain (bundled wit/ + scripts/build-pywasm.cljs drive it).
build = ["componentize-py>=0.23"]
dev = ["pytest>=7", "coverage>=7", "componentize-py>=0.23"]

[project.urls]
ADR = "https://github.com/gftdcojp/net-kotobase/blob/main/docs/adr/2606060004-kotoba-modal-compatible-sdk.md"
Source = "https://github.com/gftdcojp/net-kotobase/tree/main/kotoba/sdk/kotoba-modal"

[tool.setuptools.packages.find]
where = ["."]
include = ["kotoba_modal*"]

[tool.setuptools.package-data]
kotoba_modal = ["py.typed", "scripts/build-pywasm.cljs", "wit/world.wit"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# `build` marks the live componentize-py integration test (skipped if absent).
markers = ["build: requires the componentize-py toolchain"]

[tool.coverage.run]
source = ["kotoba_modal"]

[tool.coverage.report]
# Source modules hold 100%; only WIT-only guest branches are excluded.
exclude_lines = ["pragma: no cover", "raise NotImplementedError"]
