[package]
name = "kotoba-store-web"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Browser IndexedDB block store for KOTOBA (wasm32 only)"

# This crate is intentionally wasm32-only.  Native builds only compile
# the AsyncBlockStore re-export; the IdbBlockStore implementation is
# gated behind `cfg(target_arch = "wasm32")`.

[dependencies]
kotoba-core.workspace = true
bytes.workspace = true
anyhow.workspace = true
async-trait.workspace = true
serde = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen        = "0.2"
wasm-bindgen-futures = "0.4"
js-sys              = "0.3"
web-sys             = { version = "0.3", features = [
    "IdbDatabase",
    "IdbFactory",
    "IdbObjectStore",
    "IdbOpenDbRequest",
    "IdbRequest",
    "IdbTransaction",
    "IdbTransactionMode",
    "IdbVersionChangeEvent",
    "Window",
] }
serde-wasm-bindgen  = "0.6"

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"
