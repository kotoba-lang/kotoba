<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kotoba browser node — demo (ADR-2606013600)</title>
<style>
  body{font:15px/1.6 system-ui,sans-serif;max-width:44rem;margin:2rem auto;padding:0 1rem}
  input{font:inherit;padding:.4rem .6rem;width:60%}
  pre{background:#1112;padding:.8rem;border-radius:.4rem;overflow:auto}
  .tag{font-size:.8rem;opacity:.7}
</style>
</head>
<body>
<h1>kotoba browser node</h1>
<p class="tag">The Service Worker serves <code>/xrpc/...searchActors</code> from the
in-browser kotoba read engine (wasm) — no server query round-trip. ADR-2606013600.</p>

<p>
  <input id="q" placeholder="search actors… (try: tsumugi)" value="tsumugi">
  <button id="go">search</button>
</p>
<pre id="out">registering service worker…</pre>

<script type="module">
const out = document.getElementById("out");
async function main() {
  if (!("serviceWorker" in navigator)) { out.textContent = "no service worker support"; return; }
  const reg = await navigator.serviceWorker.register("./kotoba-sw.js", { type: "module" });
  await navigator.serviceWorker.ready;
  // ensure the active worker controls this page
  if (!navigator.serviceWorker.controller) { location.reload(); return; }

  // Same-origin seed (CORS-free): hand the SW a real datoms snapshot.
  const seed = await (await fetch("./seed-datoms.json")).json();
  await new Promise((resolve) => {
    const ch = new MessageChannel();
    ch.port1.onmessage = () => resolve();
    navigator.serviceWorker.controller.postMessage({ type: "seed", datoms: seed }, [ch.port2]);
  });
  out.textContent = `service worker active — seeded ${seed.length} datoms — querying the LOCAL wasm node.`;

  async function search(q) {
    // Same fetch @etzhayyim/yoro-rw-free makes; the SW answers it locally.
    const r = await fetch(`/xrpc/app.bsky.actor.searchActors?q=${encodeURIComponent(q)}`);
    const served = r.headers.get("x-kotoba-sw") || "network";
    const j = await r.json();
    out.textContent = `served-by: ${served}\n` + JSON.stringify(j, null, 2);
  }
  document.getElementById("go").onclick = () => search(document.getElementById("q").value);
  search("tsumugi");
}
main();
</script>
</body>
</html>
