[package]
name = "kotoba-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "kotoba browser node (P0 PoC) — kqe read engine over wasm-bindgen (ADR-2606013600)"

# Browser node target: wasm32-unknown-unknown via wasm-bindgen.
# Build: cargo build --target wasm32-unknown-unknown -p kotoba-wasm
#   (then wasm-bindgen / wasm-pack for the JS+wasm bundle)
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
kotoba-core = { path = "../kotoba-core" }
kotoba-kqe = { path = "../kotoba-kqe" }
serde = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
# Some transitive crate may pull getrandom; on wasm it needs the js backend.
getrandom = { version = "0.2", features = ["js"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"
