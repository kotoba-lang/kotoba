[package]
name = "kotoba-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "kotoba browser node — kqe read engine + CID-verified Prolly traversal over wasm-bindgen (ADR-2606013600)"

# Browser node target: wasm32-unknown-unknown via wasm-bindgen.
# Build: cargo build --target wasm32-unknown-unknown -p kotoba-wasm
#   (then wasm-bindgen / wasm-pack for the JS+wasm bundle)
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
kotoba-core = { path = "../kotoba-core" }
kotoba-datomic = { path = "../kotoba-datomic" }
kotoba-edn = { path = "../kotoba-edn" }
kotoba-query = { path = "../kotoba-query" }
# Wasm-safe canonical IPNS head record (ADR-2606066000) — the browser emits the
# SAME member-signed record kotoba-ipfs verifies (no parallel format).
kotoba-ipns-record = { path = "../kotoba-ipns-record" }
serde = { workspace = true }
serde_json = { workspace = true }
ciborium = { workspace = true }
bytes = { workspace = true }
anyhow = { workspace = true }
# Client-side sovereign crypto (sign commits + encrypt field values). All
# pure-Rust → wasm32-clean; entropy via getrandom/js on wasm.
ed25519-dalek = { workspace = true }
aes-gcm = { workspace = true }
rand_core = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
# Browser durable block tier (IndexedDB) — content-addressed write persistence.
kotoba-store-web = { path = "../kotoba-store-web" }
# Some transitive crate may pull getrandom; on wasm it needs the js backend.
getrandom = { version = "0.2", features = ["js"] }

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"
