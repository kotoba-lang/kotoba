[package]
name = "kotoba-word"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "kotoba word registry: agent-callable units (closure/process/http/wasm) normalized to MCP tools + ATProto lexicons"

[features]
default = ["http"]
# http executor capability (ctx.http_get) — reqwest-backed
http = ["dep:reqwest"]
# wasm word executor — runs kotoba-udf components on kotoba-runtime (wasmtime 22)
wasm-udf = ["dep:kotoba-runtime", "dep:ciborium"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
thiserror.workspace = true
anyhow.workspace = true
tokio.workspace = true
futures.workspace = true
tracing.workspace = true
blake3.workspace = true
reqwest = { workspace = true, optional = true }
kotoba-runtime = { workspace = true, optional = true }
ciborium = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3"
