[package]
name = "kotoba-turn"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Kotoba TURN relay (RFC 8656) — socket-free core (ephemeral-credential auth via HMAC-SHA1 coturn use-auth-secret, STUN codec, allocation state machine, ChannelData framing, request auth/demux gate) PLUS an async UDP relay listener (feature `listener`): Allocate/Refresh/CreatePermission/ChannelBind/Binding + Send/ChannelData/Data-indication forwarding over a relay-port pool. TCP/TLS listeners remain. See docs/ADR-turn-relay.md and the kotoba-net WebRTC ADR (root 2606271800)."

[dependencies]
hmac      = { workspace = true }
sha1      = { workspace = true }
base64    = { workspace = true }
thiserror = { workspace = true }
# The async UDP listener shell is optional: the socket-free core (auth, STUN codec,
# allocation table, ChannelData) builds and tests with zero async deps.
tokio     = { workspace = true, optional = true }

[features]
default = []
# Pull in the async UDP relay listener (`listener` module) over the pure core.
listener = ["dep:tokio"]
