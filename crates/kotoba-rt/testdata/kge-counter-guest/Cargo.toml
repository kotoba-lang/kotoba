# Standalone (own [workspace]) so it builds outside the kotoba workspace with a
# wasm32-wasip2 target. Produces the kge `game` component test fixture.
[package]
name = "kge-counter-guest"
version = "0.1.0"
edition = "2021"

[dependencies]
wit-bindgen-rt = { version = "0.41", features = ["bitflags"] }
# no_std global allocator → the component imports NO `wasi:*` (determinism by
# construction; no wall-clock/random/sockets even reachable).
dlmalloc = { version = "0.2", features = ["global"] }

[lib]
crate-type = ["cdylib"]

[package.metadata.component]
package = "kotoba:kge-guest"

[package.metadata.component.target]
path = "wit"
world = "game"

[profile.release]
opt-level = "s"
strip = true

[workspace]
