[package]
name = "kotoba-store"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Kotoba content-addressed block store (sled + S3/B2 + tiered + iroh)"

[features]
default   = ["iroh-cold"]
iroh-cold = ["dep:iroh-blobs", "dep:iroh-io"]

[dependencies]
kotoba-core.workspace = true
sled             = { workspace = true }
bytes.workspace  = true
serde.workspace  = true
thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true
object_store     = { workspace = true }
reqwest          = { workspace = true }
tokio            = { workspace = true, features = ["rt"] }
iroh-blobs       = { version = "0.30", optional = true }
iroh-io          = { version = "0.6", optional = true }

[dev-dependencies]
criterion.workspace = true
tokio             = { workspace = true, features = ["rt-multi-thread"] }

[[bench]]
name = "tiered_store"
harness = false

[[bench]]
name = "car_flush"
harness = false
