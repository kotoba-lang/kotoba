[package]
name = "kotoba-kotodama-inference"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Distributed GPU inference engine — single Rust codebase for browser (wasm32 + WebGPU) and native (Metal/Vulkan)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytemuck = { version = "1", features = ["derive"] }
blake3 = "1"
log = "0.4"
base64 = "0.22"
futures-channel = "0.3"

# GPU compute — wgsl + webgpu (browser) + metal (macOS native).
# wgpu default = [wgsl, dx12, metal, webgpu]. We use default-features = false
# to avoid dx12 dep, then add what we need explicitly.
wgpu = { version = "24", default-features = false, features = ["wgsl", "webgpu", "metal"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window"] }
js-sys = "0.3"
getrandom = { version = "0.2", features = ["js"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "signal"] }
ureq = "2"
env_logger = "0.11"
libc = "0.2"

[features]
default = ["native"]
native = []
