[project]
name = "kotodama"
version = "0.3.110"
description = "Kotodama: Kotoba py wasm SDK and agent framework"
requires-python = ">=3.11"
dependencies = [
  # Core language/model/execution
  "langgraph>=0.2.0",
  "pydantic>=2.7.0",
  "pydantic-settings>=2.3.0",
  "langchain-anthropic>=0.3.0",
  "langchain-openai>=0.3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.24.0",
  "ruff>=0.8.0",
  "mypy>=1.13.0",
  # Optional runtime deps exercised by the organism test suite:
  #   - Pillow: multi-modal image observation (organism/observation.py, axis F)
  #   - aiohttp: fleet-cell healthz/API HTTP server (organism/fleet_cell_main.py)
  "pillow>=11.0.0",
  "aiohttp>=3.14.0",
]
eligibility = [
  # ADR-2605172300 §3 — EligibilityCell EIP-191 payload construction must
  # produce a byte-identical hash to the on-chain Phenotype.payloadHash.
  # eth-abi + eth-utils give us encode() + keccak() with the exact same
  # semantics as Solidity's abi.encode + keccak256.
  "eth-abi>=5.0.0",
  "eth-utils>=4.0.0",
  # eth-utils delegates keccak to eth-hash, which needs a backend. On
  # Python 3.13+ wheels are spotty for some backends — pycryptodome is
  # the lowest-friction option that ships wheels for all maintained
  # interpreters.
  "pycryptodome>=3.20.0",
  # web3.py — chain RPC + transaction signing for the EligibilityCell
  # production ports (submit_phenotype against Phenotype.setMultiplier
  # on geth-private).
  "web3>=7.0.0",
  "eth-account>=0.13.0",
]
db-tools = [
  # ADR-2605080400: Alembic — Python-owned table migrations only.
  # Scope is limited to LangGraph checkpointer state and SQLMesh state tables.
  # Must NOT touch vertex_* / edge_* / mv_* (Kysely TypeScript scope).
  "alembic>=1.13.0",
  # ADR-2605080500: SQLMesh — MV SQL source of truth and lineage tracking.
  # Replaces Kysely TypeScript for materialized view management (long-term).
  # Heavy dep (~60 MB); lazy-loaded in sqlmesh/* tooling, not in worker hot path.
  "sqlmesh>=0.100.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
# kotoba-kotodama-cell-runner — Murakumo fleet cell daemon entrypoint (ADR-2605192415 §7.1)
kotoba-kotodama-cell-runner = "kotodama.cell_runner_main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/kotodama"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
# `-p no:langsmith_plugin`: langsmith ships a pytest plugin that imports
# pydantic at module-load time. On machines where pydantic-core and
# pydantic versions are out of sync (common on system Python 3.14),
# its autoload crashes pytest collection before any test code runs.
# Pykotoba-kotodama has langchain-* + pydantic in its dep tree, so this hits
# constantly. We don't use langsmith in tests, so the safest fix is
# to disable that plugin permanently. Ad-hoc alternative: prefix
# invocations with PYTEST_DISABLE_PLUGIN_AUTOLOAD=1.
addopts = "--import-mode=importlib -p no:langsmith_plugin"
