# Alembic configuration for kotodama (ADR-2605080400).
#
# SCOPE CONSTRAINT: Alembic manages Python-owned tables ONLY.
# DO NOT add migrations that touch vertex_* / edge_* / mv_* tables —
# those are Kysely TypeScript scope (30-graph/graph-schema/migrations/).
# The env.py linter will error on any such attempt.

[alembic]
script_location = alembic
prepend_sys_path = .

# Timestamp-prefix migration names (matches Kysely convention in graph-schema).
file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for generated timestamps.
timezone = UTC

# sqlalchemy.url is populated at runtime from RW_URL env var in env.py.
# Do not hardcode credentials here.
sqlalchemy.url =

[post_write_hooks]
# ruff format on generated migration files.
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/../../.venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
