name: Provider soak evidence

on:
  workflow_dispatch:

jobs:
  provider-shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned language qualification authority
        uses: actions/checkout@v4
        with:
          repository: kotoba-lang/kotoba-lang
          ref: 7adcda5873e1c473a8ab326e70701dd836476f21
          path: _authority/kotoba-lang
          persist-credentials: false
      - name: Checkout pinned compiler qualification evidence
        uses: actions/checkout@v4
        with:
          repository: kotoba-lang/compiler
          ref: 9fde05c927bdab96d549deb663ed54e8fdb1f9e5
          path: _evidence/compiler
          persist-credentials: false
      - name: Checkout pinned kototama qualification evidence
        uses: actions/checkout@v4
        with:
          repository: kotoba-lang/kototama
          ref: d96f717b202830a1a50a28fb3b59a811987cfcdb
          path: _evidence/kototama
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
          bb: latest
      - name: Checkout contract siblings
        run: |
          mkdir -p ../../kotoba-lang
          git clone --depth 1 https://github.com/kotoba-lang/kotoba-core-contracts ../../kotoba-lang/kotoba-core-contracts
          git clone --depth 1 https://github.com/kotoba-lang/kotoba-selfhost-contracts ../../kotoba-lang/kotoba-selfhost-contracts
          git clone --depth 1 https://github.com/kotoba-lang/cacao ../../kotoba-lang/cacao
          git clone --depth 1 https://github.com/kotoba-lang/ed25519 ../../kotoba-lang/ed25519
          git clone --depth 1 https://github.com/kotoba-lang/dag-cbor ../../kotoba-lang/dag-cbor
      - name: Run provider shadow and loopback oracle tests
        run: clojure -M:test
        env:
          KOTOBA_LANG_AUTHORITY_ROOT: ${{ github.workspace }}/_authority/kotoba-lang
          KOTOBA_COMPILER_EVIDENCE_ROOT: ${{ github.workspace }}/_evidence/compiler
          KOTOTAMA_EVIDENCE_ROOT: ${{ github.workspace }}/_evidence/kototama
      - name: Emit immutable soak evidence
        run: |
          mkdir -p target
          bb scripts/q9-provider-soak.bb record > target/q9-provider-soak-run.edn
      - uses: actions/upload-artifact@v4
        with:
          name: q9-provider-soak-${{ github.run_id }}
          path: target/q9-provider-soak-run.edn
          if-no-files-found: error
