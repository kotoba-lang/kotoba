name: Native CLI release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-15-intel
            platform: darwin-amd64
          - os: ubuntu-24.04
            platform: linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned language qualification authority
        uses: actions/checkout@v4
        with:
          repository: kotoba-lang/kotoba-lang
          ref: 7adcda5873e1c473a8ab326e70701dd836476f21
          path: _authority/kotoba-lang
          persist-credentials: false
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - name: Verify release source and safety contracts
        run: clojure -M:test
        env:
          KOTOBA_LANG_AUTHORITY_ROOT: ${{ github.workspace }}/_authority/kotoba-lang
      - run: chmod +x scripts/build-native.sh && scripts/build-native.sh
      - name: Verify JVM-free release boundary
        run: node scripts/verify-release-binary.mjs target/native/kotoba
      - name: Record release evidence
        run: |
          mkdir -p target/release-evidence
          cp target/native/release-evidence.json \
            "target/release-evidence/kotoba-${{ matrix.platform }}.json"
      - name: Package
        run: |
          mkdir -p "target/package"
          cp target/native/kotoba LICENSE README.md "target/package/"
          tar -C target/package -czf "target/kotoba-${{ matrix.platform }}.tar.gz" kotoba LICENSE README.md
          (cd target && shasum -a 256 "kotoba-${{ matrix.platform }}.tar.gz" > "kotoba-${{ matrix.platform }}.tar.gz.sha256")
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/kotoba-${{ matrix.platform }}.tar.gz
            target/kotoba-${{ matrix.platform }}.tar.gz.sha256
            target/release-evidence/kotoba-${{ matrix.platform }}.json
