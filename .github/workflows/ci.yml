name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  clj-launcher:
    name: CLJ launcher gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: Checkout contract siblings (deps.edn :local/root)
        run: |
          mkdir -p ../../kotoba-lang
          git clone --depth 1 https://github.com/kotoba-lang/kotoba-core-contracts ../../kotoba-lang/kotoba-core-contracts
          git clone --depth 1 https://github.com/kotoba-lang/kotoba-selfhost-contracts ../../kotoba-lang/kotoba-selfhost-contracts
          git clone --depth 1 https://github.com/kotoba-lang/kotoba-lang ../../kotoba-lang/kotoba-lang
          git clone --depth 1 https://github.com/kotoba-lang/cacao ../../kotoba-lang/cacao
          git clone --depth 1 https://github.com/kotoba-lang/ed25519 ../../kotoba-lang/ed25519
          git clone --depth 1 https://github.com/kotoba-lang/dag-cbor ../../kotoba-lang/dag-cbor
          ln -s ../../kotoba-lang/kotoba-lang ../kotoba-lang
      - name: Test CLJ launcher
        run: clojure -M:test
      - name: Lint CLJ launcher (clj-kondo)
        run: clojure -M:lint
      - name: Smoke CLJ launcher
        run: bin/kotoba-clj check --kind cli-contract --json
      - name: Smoke package admission gate
        run: |
          bin/kotoba-clj package verify --lock test/fixtures/package/positive-lock.edn --trust test/fixtures/package/trust.edn --json
          if bin/kotoba-clj package verify --lock test/fixtures/package/version-only-lock.edn --json; then
            echo "expected version-only lock to be rejected" >&2
            exit 1
          fi
  python-sdk:
    name: Python SDK gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/kotoba-modal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/kotoba-modal/pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install pytest -e .
      - name: Test
        run: |
          if find tests -type f -name "*.py" -print -quit 2>/dev/null | grep -q .; then
            python -m pytest -q
          else
            echo "No Python SDK tests found; package and wheel checks still run."
          fi
      - name: Wheel contains bundled assets
        run: |
          tmpdir="$(mktemp -d)"
          python -m pip wheel . --no-deps -w "$tmpdir"
          python - "$tmpdir" <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          wheels = list(Path(sys.argv[1]).glob("*.whl"))
          assert len(wheels) == 1, wheels
          required = {
              "kotoba_modal/scripts/build-pywasm.cljs",
              "kotoba_modal/wit/world.wit",
              "kotoba_modal/py.typed",
          }
          with zipfile.ZipFile(wheels[0]) as zf:
              names = set(zf.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"missing from wheel: {missing}")
          PY
