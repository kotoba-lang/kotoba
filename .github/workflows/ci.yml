name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  clj-launcher:
    name: CLJ launcher gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest
      - name: Test CLJ launcher
        run: clojure -M:test
      - name: Smoke CLJ launcher
        run: bin/kotoba-clj check --kind cli-contract --json

  rust-default:
    name: Rust default gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Use runner host target
        run: |
          host="$(rustc -vV | sed -n 's/^host: //p')"
          cat > .cargo/config.toml <<EOF
          [build]
          target = "$host"
          EOF
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Test
        run: cargo test --workspace

  rust-all-features:
    name: Rust all-features gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Use runner host target
        run: |
          host="$(rustc -vV | sed -n 's/^host: //p')"
          cat > .cargo/config.toml <<EOF
          [build]
          target = "$host"
          EOF
      - uses: Swatinem/rust-cache@v2
      - name: Check all features
        run: cargo check --workspace --all-features
      - name: Clippy all features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test LLM all features
        run: cargo test -p kotoba-llm --all-features

  python-sdk:
    name: Python SDK gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/kotoba-modal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/kotoba-modal/pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install pytest -e .
      - name: Test
        run: |
          if find tests -type f -name "*.py" -print -quit 2>/dev/null | grep -q .; then
            python -m pytest -q
          else
            echo "No Python SDK tests found; package and wheel checks still run."
          fi
      - name: Wheel contains bundled assets
        run: |
          tmpdir="$(mktemp -d)"
          python -m pip wheel . --no-deps -w "$tmpdir"
          python - "$tmpdir" <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          wheels = list(Path(sys.argv[1]).glob("*.whl"))
          assert len(wheels) == 1, wheels
          required = {
              "kotoba_modal/scripts/build-pywasm.bb",
              "kotoba_modal/wit/world.wit",
              "kotoba_modal/py.typed",
          }
          with zipfile.ZipFile(wheels[0]) as zf:
              names = set(zf.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"missing from wheel: {missing}")
          PY
