name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-default:
    name: Rust default gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Use runner host target
        run: |
          host="$(rustc -vV | sed -n 's/^host: //p')"
          cat > .cargo/config.toml <<EOF
          [build]
          target = "$host"
          EOF
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Test
        run: cargo test --workspace
      - name: Kotoba language profile gates
        run: |
          cargo test -p kotoba-lang
          cargo test -p kotoba-clj --test lang_profile_conformance
          cargo test -p kotoba-clj --test kotoba_file binary_runs_inline_expression
          cargo test -p kotoba-clj --test kotoba_file binary_writes_inline_expression_wasm
          cargo run -p kotoba-cli -- -e '(+ 1 2)'
          cargo run -p kotoba-cli -- wasm safe-policy examples/kotoba-shell-hello/src/policy.kotoba
          cargo check -p kotoba-clj
      - name: Kotoba shell live adapter supervisor evidence
        run: |
          cat > /tmp/kotoba-shell-adapter-fixture.py <<'PY'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json

          class Handler(BaseHTTPRequestHandler):
              def do_HEAD(self):
                  self.send_response(200)
                  self.end_headers()

              def do_POST(self):
                  n = int(self.headers.get("content-length", "0") or 0)
                  data = json.loads(self.rfile.read(n) or b"{}")
                  op = data.get("operation", "")
                  if op == "auth.has-capability":
                      body = {"allowed": True}
                  elif op == "kqe.query":
                      body = {"quads": []}
                  elif op == "kqe.get-objects":
                      body = {"objects": ["Ada"]}
                  elif op in ("kqe.assert-quad", "kqe.retract-quad"):
                      body = {"ok": True}
                  elif op == "llm.infer":
                      body = {"output": "live:pong"}
                  else:
                      body = {"error": "unknown operation", "operation": op}
                  raw = json.dumps(body).encode()
                  self.send_response(200)
                  self.send_header("content-type", "application/json")
                  self.send_header("content-length", str(len(raw)))
                  self.end_headers()
                  self.wfile.write(raw)

              def log_message(self, *args):
                  pass

          HTTPServer(("127.0.0.1", 39819), Handler).serve_forever()
          PY
          python3 /tmp/kotoba-shell-adapter-fixture.py &
          fixture_pid="$!"
          trap 'kill "$fixture_pid"' EXIT
          sleep 1
          cargo run -p kotoba-cli -- shell export examples/kotoba-shell-hello/app.kotoba.edn --target android --out-dir target/kotoba-shell/ci-release
          export KOTOBA_AUTH_ADAPTER_URL=http://127.0.0.1:39819
          export KOTOBA_KQE_ADAPTER_URL=http://127.0.0.1:39819
          export KOTOBA_LLM_ADAPTER_URL=http://127.0.0.1:39819
          cargo run -p kotoba-cli -- shell adapter-check --target android --probe --smoke target/kotoba-shell/ci-release/android/kotoba-shell-hello/kotoba-shell-host-adapters.json
          cargo run -p kotoba-cli -- shell supervisor-check examples/kotoba-shell-hello/app.kotoba.edn --target android --run --component llm-agent --function reply-len --adapter-manifest target/kotoba-shell/ci-release/android/kotoba-shell-hello/kotoba-shell-host-adapters.json --adapter-timeout-seconds 5 --evidence target/kotoba-shell/ci/live-adapter-supervisor-evidence.json
          cargo run -p kotoba-cli -- shell build examples/kotoba-shell-hello/app.kotoba.edn --target android
          cargo run -p kotoba-cli -- shell coverage --json --evidence target/kotoba-shell/ci/coverage-evidence.json
          cargo run -p kotoba-cli -- shell coverage-check --min-functional 70 --min-release-maturity 45 --evidence target/kotoba-shell/ci/coverage-check-evidence.json
          cargo run -p kotoba-cli -- shell doctor-check --target android --evidence target/kotoba-shell/ci/android-runtime-doctor-evidence.json
          cargo run -p kotoba-cli -- shell runtime-check --target android --timeout-seconds 0 --evidence target/kotoba-shell/ci/android-runtime-evidence.json target/kotoba-shell/build/android/kotoba-shell-hello
          cargo run -p kotoba-cli -- shell evidence-check target/kotoba-shell/ci --profile ci --evidence target/kotoba-shell/ci/evidence-summary.json
      - uses: actions/upload-artifact@v4
        with:
          name: kotoba-shell-live-adapter-evidence
          path: |
            target/kotoba-shell/ci/live-adapter-supervisor-evidence.json
            target/kotoba-shell/ci/coverage-evidence.json
            target/kotoba-shell/ci/coverage-check-evidence.json
            target/kotoba-shell/ci/android-runtime-doctor-evidence.json
            target/kotoba-shell/ci/android-runtime-evidence.json
            target/kotoba-shell/ci/evidence-summary.json

  rust-all-features:
    name: Rust all-features gates
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Use runner host target
        run: |
          host="$(rustc -vV | sed -n 's/^host: //p')"
          cat > .cargo/config.toml <<EOF
          [build]
          target = "$host"
          EOF
      - uses: Swatinem/rust-cache@v2
      - name: Check all features
        run: cargo check --workspace --all-features
      - name: Clippy all features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test LLM all features
        run: cargo test -p kotoba-llm --all-features
      - name: Test kotoba-clj selfhost component gate
        run: cargo test -p kotoba-clj --features component --test selfhost
      - name: Test kotoba-clj selfhost CLI gate
        run: cargo test -p kotoba-clj --features cli --test kotoba_file selfhost

  wallet-cljs:
    name: Wallet CLJS maturity gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/kotoba-wasm/web/cljs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/kotoba-wasm/web/cljs/package-lock.json
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
      - name: Install dependencies
        run: npm ci
      - name: Wallet maturity gate
        run: npm run test:wallet:all

  python-sdk:
    name: Python SDK gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/kotoba-modal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/kotoba-modal/pyproject.toml
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install pytest -e .
      - name: Test
        run: python -m pytest -q
      - name: Wheel contains bundled assets
        run: |
          tmpdir="$(mktemp -d)"
          python -m pip wheel . --no-deps -w "$tmpdir"
          python - "$tmpdir" <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          wheels = list(Path(sys.argv[1]).glob("*.whl"))
          assert len(wheels) == 1, wheels
          required = {
              "kotoba_modal/scripts/build-pywasm.bb",
              "kotoba_modal/wit/world.wit",
              "kotoba_modal/py.typed",
          }
          with zipfile.ZipFile(wheels[0]) as zf:
              names = set(zf.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"missing from wheel: {missing}")
          PY
