<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kotoba EDA Source Viewer</title>
<style>
  :root {
    --bg: #f7f8fb;
    --ink: #172033;
    --muted: #667085;
    --line: #d7dce5;
    --panel: #ffffff;
    --blue: #2563eb;
    --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; color: var(--ink); background: var(--bg); font-family: var(--sans); }
  nav {
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,.92);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 18px; }
  nav .wrap { min-height: 52px; display: flex; align-items: center; gap: 14px; }
  nav a { color: var(--blue); text-decoration: none; font-size: 13px; }
  nav a:hover { text-decoration: underline; }
  .brand { font-weight: 760; margin-right: auto; }
  main { padding: 18px 0 42px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }
  h1 { margin: 0 0 8px; font-size: 24px; line-height: 1.2; }
  p { margin: 0 0 12px; color: var(--muted); line-height: 1.6; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .toolbar a, .toolbar button {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    padding: 7px 10px;
    font-weight: 690;
    text-decoration: none;
    cursor: pointer;
  }
  .toolbar a.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  pre {
    margin: 0;
    overflow: auto;
    min-height: 60vh;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    background: #101827;
    color: #dbeafe;
    font: 12px/1.55 var(--mono);
    white-space: pre;
  }
</style>
</head>
<body>
<nav>
  <div class="wrap">
    <div class="brand">kotoba / eda / source</div>
    <a href="./#flow">Workbench</a>
    <a href="./#formats">Formats</a>
    <a href="../">kotoba</a>
  </div>
</nav>
<main class="wrap">
  <section class="panel">
    <h1 id="title">Source Viewer</h1>
    <p id="desc">CLJC/EDN を GitHub Pages の download MIME に触れず、HTML 内で表示します。</p>
    <div class="toolbar">
      <a class="primary" id="raw" href="#">Raw file</a>
      <button id="copy" type="button">Copy</button>
      <a href="source.html?file=kotoba_eda_core.cljc">Core CLJC</a>
      <a href="source.html?file=kotoba_eda_formats.cljc">Formats CLJC</a>
      <a href="source.html?file=eda_file_formats.edn">Formats EDN</a>
      <a href="source.html?file=eda_runner_adapters.edn">Runners EDN</a>
      <a href="source.html?file=eda_coverage_schema.edn">Coverage EDN</a>
      <a href="source.html?file=eda_signoff_evidence.edn">Signoff EDN</a>
      <a href="source.html?file=kotoba_eda_runner.cljc">Runner CLJC</a>
      <a href="source.html?file=eda_murakumo_job.edn">Murakumo EDN</a>
      <a href="source.html?file=kotoba_eda_murakumo.cljc">Murakumo CLJC</a>
      <a href="source.html?file=kotoba_eda_ui.cljc">UI Hiccup</a>
      <a href="source.html?file=runner_host.clj">Host runner</a>
      <a href="source.html?file=kami_render_ir.edn">kami IR EDN</a>
    </div>
    <pre id="source">loading...</pre>
  </section>
</main>
<script>
(() => {
  const allowed = new Set([
    "kotoba_eda_core.cljc",
    "kotoba_eda_formats.cljc",
    "kotoba_eda_runner.cljc",
    "kotoba_eda_murakumo.cljc",
    "kotoba_eda_ui.cljc",
    "eda_file_formats.edn",
    "eda_runner_adapters.edn",
    "eda_coverage_schema.edn",
    "eda_signoff_evidence.edn",
    "eda_murakumo_job.edn",
    "runner_host.clj",
    "kami_render_ir.edn"
  ]);
  const params = new URLSearchParams(location.search);
  const file = params.get("file") || "kotoba_eda_core.cljc";
  const selected = allowed.has(file) ? file : "kotoba_eda_core.cljc";
  const source = document.getElementById("source");
  const raw = document.getElementById("raw");
  document.getElementById("title").textContent = selected;
  raw.href = selected;
  fetch(selected, { cache: "no-store" })
    .then((r) => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then((text) => { source.textContent = text; })
    .catch((err) => { source.textContent = "failed to load " + selected + ": " + err.message; });
  document.getElementById("copy").onclick = async () => {
    await navigator.clipboard.writeText(source.textContent);
  };
})();
</script>
</body>
</html>
