# arXiv submission metadata for the Kotoba paper.
# Not consumed by LaTeX; a convenience record for the arXiv web form / CI.

title: >-
  Kotoba: A Content-Addressed Datalog Substrate
  for Accountable Decentralized Agent Memory

authors:
  - name: Jun Kawasaki
    affiliation: com-junkawasaki / etzhayyim

primary_category: cs.DB        # Databases
cross_lists:
  - cs.DC                      # Distributed, Parallel, and Cluster Computing
  - cs.CR                      # Cryptography and Security

license: arXiv non-exclusive (CC BY 4.0 recommended)

comments: >-
  System description. Source and interactive explainers at
  https://com-junkawasaki.github.io/kotoba/

abstract: >-
  We present Kotoba, a content-addressed knowledge-graph database designed as a
  durable, queryable, and accountable memory substrate for decentralized
  AI-agent systems. Kotoba combines design primitives usually provided by
  separate systems: immutable Datomic-style 5-tuple datoms whose transactions
  and indices are named by IPFS-compatible content identifiers; a covering
  in-memory arrangement (EAVT/AEVT/AVET/VAET) mirrored by history-independent
  Prolly Tree indices; Datalog evaluation over datom history with a SPARQL 1.1
  interoperability surface; Pregel bulk-synchronous-parallel graph computation;
  capability-based authorization via chain-agnostic CACAO (CAIP-74) delegation
  chains; end-to-end encrypted agent messages using the Signal protocol (X3DH +
  Double Ratchet); sandboxed polyglot user logic via the WebAssembly Component
  Model, including a native Kotoba/EDN-to-WASM compiler; and a tiered,
  optionally AES-256-GCM-sealed block store backed by IPFS export. We describe
  the data model, storage and indexing layers, query and computation engines,
  security architecture, and runtime, and report micro- and macro-benchmarks on
  commodity hardware, including 5,222 entities/second sustained ingest and
  12,753 queries/second of CACAO-gated, replay-protected query throughput. We
  close with a five-axis analysis of the open problems toward full multi-writer
  decentralization.

keywords:
