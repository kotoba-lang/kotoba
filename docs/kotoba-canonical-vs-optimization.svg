<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 1010" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#475569"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#15803d"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/></marker>
    <style>
      .t{font-size:13px;fill:#0f172a}.s{font-size:11px;fill:#475569}
      .mono{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;fill:#334155}
      .h{font-size:14px;font-weight:700}.lane{font-size:12px;font-weight:700;letter-spacing:.05em}
      .badge{font-size:10px;font-weight:700;fill:#fff}
    </style>
  </defs>

  <text x="660" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">kotoba — canonical truth vs. removable optimisation (analysis + ADR-2606041151)</text>
  <text x="660" y="50" text-anchor="middle" class="s">What is structurally necessary (green) vs. an optimisation/deferral artifact (amber, dashed). Proposed changes in blue.</text>

  <!-- ============ CANONICAL band ============ -->
  <rect x="40" y="74" width="1240" height="208" rx="12" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="60" y="98" class="lane" fill="#15803d">CANONICAL — the durable truth (everything is reconstructible from here)</text>

  <rect x="60" y="112" width="220" height="150" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="74" y="132" class="h">Datom log</text>
  <text x="74" y="150" class="mono">(E,A,V,T,Added)</text>
  <text x="74" y="166" class="s">first-class canonical state</text>
  <text x="74" y="180" class="s">ADR-2605312345</text>
  <text x="74" y="202" class="s">非終末論 as-of history</text>

  <rect x="300" y="112" width="230" height="150" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="314" y="132" class="h">ProllyTree indexes</text>
  <text x="314" y="150" class="mono">EAVT·AEVT·AVET·VAET·TEA</text>
  <text x="314" y="166" class="s">DAG-CBOR/IPLD, content-</text>
  <text x="314" y="180" class="s">addressed (sha2-256 CID)</text>
  <text x="314" y="202" class="s">path-copy delta per commit</text>

  <rect x="550" y="112" width="250" height="150" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="564" y="132" class="h" fill="#15803d">CommitDag = the WAL</text>
  <text x="564" y="150" class="mono">Commit{root,index_roots,</text>
  <text x="564" y="164" class="mono">  prev,author,seq}</text>
  <text x="564" y="182" class="s">immutable · content-addressed</text>
  <text x="564" y="196" class="s">· parent-linked = a write-</text>
  <text x="564" y="210" class="s">ahead log BY CONSTRUCTION</text>
  <text x="564" y="232" class="mono">durability = atomic head-ref</text>

  <rect x="820" y="112" width="210" height="150" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="834" y="132" class="h" fill="#1d4ed8">Embedded local store</text>
  <text x="834" y="150" class="badge" fill="#2563eb">DECISION A · target</text>
  <text x="834" y="168" class="s">in-process flatfs/sled/redb</text>
  <text x="834" y="182" class="s">direct disk write (µs–ms)</text>
  <text x="834" y="200" class="s">— NOT Kubo-over-HTTP</text>
  <text x="834" y="220" class="s">= what "kotoba holds</text>
  <text x="834" y="234" class="s">local IPFS" must mean</text>

  <rect x="1050" y="112" width="210" height="150" rx="8" fill="#f8fafc" stroke="#64748b"/>
  <text x="1064" y="132" class="h">Async export</text>
  <text x="1064" y="150" class="s">of sealed commits only</text>
  <text x="1064" y="168" class="mono">Kubo IPFS (network)</text>
  <text x="1064" y="184" class="mono">B2 cold pin (ADR-2606041130)</text>
  <text x="1064" y="206" class="s">off the hot write path</text>
  <text x="1064" y="226" class="s">IPNS heads · Base L2 anchor</text>

  <path d="M280 187 L300 187" stroke="#15803d" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M530 187 L550 187" stroke="#15803d" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M800 187 L820 187" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M1030 187 L1050 187" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#a)" stroke-dasharray="4 3"/>

  <!-- ============ OPTIMISATION band ============ -->
  <rect x="40" y="300" width="1240" height="170" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-dasharray="5 4"/>
  <text x="60" y="324" class="lane" fill="#c2410c">OPTIMISATION — present but NOT structurally necessary (removable / reconstructible)</text>

  <rect x="60" y="338" width="360" height="116" rx="8" fill="#ffffff" stroke="#fdba74" stroke-dasharray="5 4"/>
  <text x="74" y="358" class="h">Hot Arrangement (in-mem)</text>
  <text x="74" y="376" class="mono">spo/pso/pos/ocp (4 indexes)</text>
  <text x="74" y="394" class="s">role: write accumulator commit()</text>
  <text x="74" y="408" class="s">sorts into the trees + ns–µs read cache</text>
  <text x="74" y="430" class="s" fill="#c2410c">authors: "in-memory Arrangement is</text>
  <text x="74" y="444" class="s" fill="#c2410c">only an optimisation" — reconstructible</text>

  <rect x="440" y="338" width="420" height="116" rx="8" fill="#ffffff" stroke="#fb923c" stroke-dasharray="5 4"/>
  <text x="454" y="358" class="h" fill="#c2410c">Journal WAL — redundant double-write</text>
  <text x="454" y="376" class="mono">every assert → publish 4 topics (spo/pso/pos/osp)</text>
  <text x="454" y="390" class="mono">→ BlockStore.put  ⟂  later ProllyTree leaves</text>
  <text x="454" y="408" class="s">blocks become garbage after commit+checkpoint;</text>
  <text x="454" y="422" class="s">via Kubo-HTTP = ~30 s startup replay bottleneck</text>
  <text x="454" y="444" class="badge" fill="#c2410c">DECISION A → demote to local-FS scratch, or REMOVE (CommitDag is the WAL)</text>

  <rect x="880" y="338" width="380" height="116" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="894" y="358" class="h" fill="#1d4ed8">DECISION A — micro-batch sync commit</text>
  <text x="894" y="378" class="s">each accept → apply_batch → new roots → Commit</text>
  <text x="894" y="392" class="s">→ embedded store → atomic head-ref update</text>
  <text x="894" y="412" class="s" fill="#1d4ed8">local IPFS makes commit CHEAP (enabler);</text>
  <text x="894" y="426" class="s" fill="#1d4ed8">micro-batch commit is what REMOVES the WAL.</text>
  <text x="894" y="446" class="s">WAL-necessity ⟂ IPFS locality — it comes from</text>

  <text x="894" y="460" class="s">deferring commits, not from IPFS being remote.</text>

  <path d="M240 338 L240 300" stroke="#ea580c" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <path d="M650 338 L650 282" stroke="#ea580c" stroke-width="1.4" fill="none" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="250" y="296" class="s" fill="#c2410c">feeds commit() / read cache (optional)</text>

  <!-- ============ QUERY TIERS ============ -->
  <rect x="40" y="492" width="1240" height="200" rx="12" fill="#ffffff" stroke="#7c3aed"/>
  <text x="60" y="516" class="lane" fill="#6d28d9">QUERY TIERS — data model is tier-1; the Datomic Datalog *engine* is not (yet)</text>

  <rect x="60" y="530" width="380" height="146" rx="8" fill="#faf5ff" stroke="#16a34a"/>
  <circle cx="80" cy="552" r="11" fill="#16a34a"/><text x="80" y="556" text-anchor="middle" class="badge">1</text>
  <text x="100" y="556" class="h">Datomic index scan</text>
  <text x="74" y="578" class="mono">EAVT 180ns · AVET · VAET reverse</text>
  <text x="74" y="594" class="s">BGP routing over arrangement/ProllyTree</text>
  <text x="74" y="608" class="s">— genuinely first-tier (the index model)</text>
  <rect x="74" y="620" width="352" height="46" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="86" y="638" class="t" fill="#1d4ed8">+ DECISION B: MaterializedView (IVM)</text>
  <text x="86" y="654" class="mono">kotoba-kqe/mv.rs — EXISTS but UNWIRED</text>

  <rect x="460" y="530" width="360" height="146" rx="8" fill="#faf5ff" stroke="#a78bfa"/>
  <circle cx="480" cy="552" r="11" fill="#a78bfa"/><text x="480" y="556" text-anchor="middle" class="badge">2</text>
  <text x="500" y="556" class="h">SPARQL-BGP cold scan</text>
  <text x="474" y="578" class="mono">kg.sparql → route_bgp_triples</text>
  <text x="474" y="594" class="s">index-selected ProllyTree scan</text>
  <text x="474" y="612" class="s">"auxiliary" by intent, yet</text>
  <text x="474" y="628" class="s" fill="#6d28d9">2.1× FASTER than Datalog today</text>
  <text x="474" y="648" class="s">(75 vs 36 QPS, 2000 entities)</text>

  <rect x="840" y="530" width="420" height="146" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-dasharray="5 4"/>
  <circle cx="860" cy="552" r="11" fill="#fb923c"/><text x="860" y="556" text-anchor="middle" class="badge">3</text>
  <text x="880" y="556" class="h" fill="#c2410c">Datalog engine — from-scratch</text>
  <text x="854" y="578" class="mono">kg.query → current_graph_deltas()</text>
  <text x="854" y="592" class="mono">→ program.evaluate_delta()  EACH CALL</text>
  <text x="854" y="610" class="s">rebuilds the fact base every request</text>
  <text x="854" y="624" class="s">(no incremental Δ / no persisted IDB)</text>
  <text x="854" y="646" class="badge" fill="#c2410c">DECISION B → replace with incremental MV → promote to tier-1</text>
  <text x="854" y="662" class="s">the "Datomic primary" intent becomes real</text>

  <path d="M650 676 C650 700 250 700 250 676" stroke="#6d28d9" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
  <path d="M1050 676 C1050 690 270 700 252 668" stroke="#2563eb" stroke-width="1.4" fill="none" stroke-dasharray="5 4" marker-end="url(#ab)"/>
  <text x="560" y="694" class="s" fill="#2563eb">wire MaterializedView → incremental Datalog as tier-1</text>

  <!-- ============ verdict ============ -->
  <rect x="40" y="712" width="1240" height="92" rx="12" fill="#f8fafc" stroke="#64748b"/>
  <text x="60" y="736" class="lane" fill="#334155">VERDICT</text>
  <text x="60" y="758" class="t">Q1 · in-mem Arrangement + Journal WAL are <tspan font-weight="700" fill="#c2410c">not structurally necessary</tspan> — optimisation + deferred-commit artifacts. The Journal WAL double-writes; the CommitDag already is a WAL.</text>
  <text x="60" y="778" class="t">Q2 · the Datomic <tspan font-weight="700">data model</tspan> is tier-1, but the Datomic Datalog <tspan font-weight="700">query engine</tspan> is <tspan font-weight="700" fill="#c2410c">not</tspan> — it re-evaluates from scratch (slower than the "auxiliary" SPARQL). The IVM primitive exists, unwired.</text>
  <text x="60" y="798" class="t">"local IPFS ⇒ no sync commit?" · local IPFS makes commit <tspan font-weight="700">cheap</tspan> (enabler); micro-batch <tspan font-weight="700">synchronous commit</tspan> is what removes the WAL. Locality alone does not.</text>
</svg>
