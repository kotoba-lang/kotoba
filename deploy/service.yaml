apiVersion: v1
kind: Service
metadata:
  name: kotoba
  namespace: kotoba
spec:
  selector:
    app.kubernetes.io/name: kotoba
  type: ClusterIP
  ports:
    - name: xrpc
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# In-cluster XRPC endpoint. NOT a public LoadBalancer anymore: the kotobase CF
# Worker reaches the pod through the cloudflared tunnel (kotoba-origin.gftd.ai →
# kotoba.kotoba.svc:8080), and S1 (KOTOBA_INTERNAL_SECRET) makes kotobase.net the
# only write surface. Demoted from LoadBalancer to ClusterIP to remove the raw
# public pod IP that bypassed the Worker (was 149.28.207.62). In-cluster callers
# resolve it by DNS; direct external writers must migrate to kotobase.net.
apiVersion: v1
kind: Service
metadata:
  name: kotoba-api
  namespace: kotoba
spec:
  selector:
    app.kubernetes.io/name: kotoba
  type: ClusterIP
  ports:
    - name: xrpc
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# Expose QUIC for p2p (optional — comment out for single-node)
apiVersion: v1
kind: Service
metadata:
  name: kotoba-p2p
  namespace: kotoba
spec:
  selector:
    app.kubernetes.io/name: kotoba
  type: LoadBalancer
  ports:
    - name: quic
      port: 4001
      targetPort: 4001
      protocol: UDP
