# kotoba-origin.gftd.ai — Cloudflare Tunnel → kotoba pod (HTTPS backend origin).
#
# Mirrors the ipfs-origin-cloudflared deployment. A dedicated named tunnel
# (`kotobase`, id fe8d39eb-07fd-4760-a8e7-0938035a0b2a) exposes the kotoba pod
# as a clean HTTPS origin that the kotobase.gftd.ai CF Worker can fetch().
#
# Why this exists: a CF Worker fetch() to the raw kotoba-api LB IP over plain
# HTTP (http://149.28.207.62:8080) is rejected by Cloudflare with error 1003
# ("Direct IP Access Not Allowed"). Routing the backend through a tunnel-backed
# HTTPS hostname (kotoba-origin.gftd.ai) fixes that — the Worker sets
# KOTOBA_BACKEND_URL=https://kotoba-origin.gftd.ai.
#
# kotoba-origin.gftd.ai has NO Worker route, so requests pass straight through
# the tunnel to the in-cluster ClusterIP (kotoba.kotoba.svc.cluster.local:8080).
# The raw LB IP stays unexposed. The kotobase.gftd.ai hostname itself is owned
# by the ai-gftd-project-kotobase Worker route (it never reaches this tunnel).
#
# Bring-up (credentials Secret is created out-of-band from the tunnel cred file;
# never check the credentials.json into git):
#
#   cloudflared tunnel create kotobase            # already done → id above
#   kubectl -n kotoba create secret generic kotobase-cloudflared \
#     --from-file=credentials.json=$HOME/.cloudflared/fe8d39eb-07fd-4760-a8e7-0938035a0b2a.json
#   kubectl apply -f 60-apps/ai-gftd-project-kotoba/deploy/cloudflared-kotobase.yaml
#   cloudflared tunnel route dns fe8d39eb-07fd-4760-a8e7-0938035a0b2a kotoba-origin.gftd.ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kotobase-cloudflared
  namespace: kotoba
  labels:
    app.kubernetes.io/name: kotobase-cloudflared
    app.kubernetes.io/part-of: kotoba-gftd-ai
data:
  config.yml: |
    tunnel: fe8d39eb-07fd-4760-a8e7-0938035a0b2a
    credentials-file: /etc/cloudflared/credentials/credentials.json
    no-autoupdate: true
    metrics: 0.0.0.0:2000
    ingress:
      - hostname: kotoba-origin.gftd.ai
        service: http://kotoba.kotoba.svc.cluster.local:8080
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kotobase-cloudflared
  namespace: kotoba
  labels:
    app.kubernetes.io/name: kotobase-cloudflared
    app.kubernetes.io/part-of: kotoba-gftd-ai
    app.kubernetes.io/component: zero-trust-origin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kotobase-cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kotobase-cloudflared
        app.kubernetes.io/component: zero-trust-origin
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.2.0
          args: ["tunnel", "--config", "/etc/cloudflared/config/config.yml", "run"]
          ports:
            - { name: metrics, containerPort: 2000, protocol: TCP }
          livenessProbe:
            httpGet: { path: /ready, port: metrics }
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m,  memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          volumeMounts:
            - { name: cloudflared-config,      mountPath: /etc/cloudflared/config,      readOnly: true }
            - { name: cloudflared-credentials, mountPath: /etc/cloudflared/credentials, readOnly: true }
      volumes:
        - name: cloudflared-config
          configMap:
            name: kotobase-cloudflared
            items: [{ key: config.yml, path: config.yml }]
        - name: cloudflared-credentials
          secret:
            secretName: kotobase-cloudflared
            items: [{ key: credentials.json, path: credentials.json }]
