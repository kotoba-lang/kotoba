apiVersion: apps/v1
kind: Deployment
metadata:
  name: kotoba
  namespace: kotoba
  labels:
    app.kubernetes.io/name: kotoba
    app.kubernetes.io/part-of: kotoba-gftd-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kotoba
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kotoba
        app.kubernetes.io/part-of: kotoba-gftd-ai
    spec:
      imagePullSecrets:
        - name: ghcr-creds

      containers:
        - name: kotoba
          image: ghcr.io/gftdcojp/kotoba:latest
          imagePullPolicy: Always

          env:
            - name: KOTOBA_PORT
              value: "8080"
            - name: KOTOBA_P2P_PORT
              value: "4001"
            - name: RUST_LOG
              value: info
            - name: KOTOBA_STORE_PATH
              value: /data/sled
            - name: KOTOBA_STORAGE_BUDGET_BYTES
              value: "8589934592"
            # IPFS Pinning Service (optional — set kotoba-ipfs-pin Secret to enable)
            # kotobase.gftd.ai IS the pin service; external IPFS is optional secondary
            - name: KOTOBA_IPFS_PIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: kotoba-ipfs-pin
                  key: KOTOBA_IPFS_PIN_ENDPOINT
                  optional: true
            - name: KOTOBA_IPFS_PIN_JWT
              valueFrom:
                secretKeyRef:
                  name: kotoba-ipfs-pin
                  key: KOTOBA_IPFS_PIN_JWT
                  optional: true
            # Email E2E vault key (optional)
            - name: KOTOBA_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: kotoba-vault
                  key: KOTOBA_VAULT_KEY
                  optional: true

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: p2p-quic
              containerPort: 4001
              protocol: UDP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

          resources:
            limits:
              memory: "1Gi"

          volumeMounts:
            - name: sled-data
              mountPath: /data/sled

      volumes:
        - name: sled-data
          persistentVolumeClaim:
            claimName: kotoba-sled
