apiVersion: apps/v1
kind: Deployment
metadata:
  name: kotoba
  namespace: kotoba
  labels:
    app.kubernetes.io/name: kotoba
    app.kubernetes.io/part-of: kotoba-etzhayyim-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kotoba
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kotoba
        app.kubernetes.io/part-of: kotoba-etzhayyim-ai
    spec:
      # PVC contains 350k+ Kubo block files; without OnRootMismatch the kubelet
      # recursively chowns all of them on every pod start (~4 min each time and
      # pod stuck ContainerCreating).  OnRootMismatch only fixes ownership when
      # the mount root UID/GID actually differs.
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: ghcr-creds

      containers:
        - name: kotoba
          # scripts/deploy.sh pins this from ghcr.io/etzhayyim/kotoba:latest
          # to the requested tag at deploy time. scripts/build-push.sh emits a
          # multi-arch manifest by default so local arm64 clusters and amd64 VKE
          # run the same tag.
          image: ghcr.io/etzhayyim/kotoba:latest
          imagePullPolicy: Always

          env:
            - name: KOTOBA_PORT
              value: "8080"
            - name: KOTOBA_P2P_PORT
              value: "4001"
            - name: RUST_LOG
              value: info
            # KOTOBA_STORE_PATH must be a SUBDIRECTORY of the PVC mount, not
            # the mount root itself.  kotoba derives `kse_store_root =
            # path.parent()` and `journal_head_path = path + ".journal-head.json"`;
            # if path == /data/sled (the PVC root) then parent = /data which is
            # ephemeral container filesystem → vault key pointer + journal head
            # vanish on every restart and the server hits genesis + first-run.
            - name: KOTOBA_STORE_PATH
              value: /data/sled/wal
            - name: KOTOBA_STORAGE_BUDGET_BYTES
              value: "8589934592"
            # Without this kotoba uses InMemoryIpnsRegistry — graph heads
            # vanish on every pod restart and `datomic.q` returns
            # "no distributed Datomic/IPNS head for graph" even though the
            # datom blocks are durably in Kubo.  Kubo's own IPNS publish path
            # writes the heads to the local IPFS keystore (PVC).
            - name: KOTOBA_IPNS
              value: kubo
            # Disable the per-request audit fingerprint commit — it pile-ups
            # against Kubo and slows user queries.  Re-enable when audit
            # durability becomes a requirement (and after the audit graph
            # has its own commit-batching / sampling story).
            - name: KOTOBA_AUDIT_DISABLED
              value: "1"
            # IPFS Pinning Service (optional — set kotoba-ipfs-pin Secret to enable)
            # kotobase.etzhayyim.com IS the pin service; external IPFS is optional secondary
            - name: KOTOBA_IPFS_PIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: kotoba-ipfs-pin
                  key: KOTOBA_IPFS_PIN_ENDPOINT
                  optional: true
            - name: KOTOBA_IPFS_PIN_JWT
              valueFrom:
                secretKeyRef:
                  name: kotoba-ipfs-pin
                  key: KOTOBA_IPFS_PIN_JWT
                  optional: true
            # Email E2E vault key (optional)
            - name: KOTOBA_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: kotoba-vault
                  key: KOTOBA_VAULT_KEY
                  optional: true
            # Stable agent identity (prevents ephemeral DID rotation on restarts)
            - name: KOTOBA_AGENT_ED25519_HEX
              valueFrom:
                secretKeyRef:
                  name: kotoba-agent-identity
                  key: KOTOBA_AGENT_ED25519_HEX
                  optional: true
            - name: KOTOBA_AGENT_X25519_HEX
              valueFrom:
                secretKeyRef:
                  name: kotoba-agent-identity
                  key: KOTOBA_AGENT_X25519_HEX
                  optional: true
            - name: KOTOBA_AGENT_DID
              valueFrom:
                secretKeyRef:
                  name: kotoba-agent-identity
                  key: KOTOBA_AGENT_DID
                  optional: true
            # S1 direct-access gate: when set, every JWT `sub`-trusting write
            # path (operator auth + kotobase pin/account) requires the trusted
            # edge Worker's `x-internal-trust: <secret>` header. This makes
            # kotobase.net the only write surface — a directly-reachable pod can
            # no longer be impersonated with a forged JWT. Reads stay ungated.
            # Same value is set as the net-kotobase Worker secret
            # (wrangler secret KOTOBA_INTERNAL_SECRET). Created out-of-band:
            #   kubectl create secret generic kotoba-internal-trust \
            #     -n kotoba --from-literal=secret=<hex>
            - name: KOTOBA_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: kotoba-internal-trust
                  key: secret

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: p2p-quic
              containerPort: 4001
              protocol: UDP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            # WAL replay + IPNS publish + SovereignCrypto retry can take
            # 30-60 s on a fresh kubo, so we delay liveness checks until the
            # ready window has had a chance to fire.  timeout=10 absorbs the
            # occasional slow /health when commit-in-flight blocks the
            # runtime briefly.
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6

          resources:
            # Split requests/limits so the scheduler accepts the pod even when
            # the GPU node is largely allocated.  Steady-state RSS is ~2 GiB;
            # 8 GiB limit gives headroom for kotoba_wasm_run bursts.  Defaulting
            # request==limit=8Gi left the pod Pending with
            # "Insufficient memory" because both A16 nodes are heavily
            # subscribed by other workloads.
            requests:
              memory: "2Gi"
            limits:
              memory: "8Gi"

          volumeMounts:
            # NOTE: no `subPath` here — kotoba's existing /data/sled tree lives
            # at the PVC root.  Adding subPath would mask that tree and force a
            # fresh genesis + first-run on every restart.  Kubo's sidecar uses
            # `subPath: ipfs` to live in its own subdirectory on the same PVC.
            - name: sled-data
              mountPath: /data/sled

        # ── Sidecar: Kubo (IPFS) daemon ─────────────────────────────────────
        # Provides the cold-tier BlockStore that kotoba's TieredBlockStore
        # writes through (KOTOBA_IPFS_ENDPOINT defaults to localhost:5001).
        # Without this sidecar the cold-put fails silently and content blocks
        # are lost on every pod restart.
        - name: kubo
          image: ipfs/kubo:v0.34.1
          command: ["/bin/sh","-c"]
          args:
            - |
              set -e
              if [ ! -f /data/ipfs/config ]; then
                ipfs init --profile=server,lowpower
              fi
              # Clean up stale lock from previous pod termination.  Without
              # this the readiness probe loops on "lock /data/ipfs/repo.lock:
              # someone else has the lock" because Kubo refuses to start.
              # Safe to run unconditionally: only this pod ever touches the
              # PVC (Recreate strategy + single replica + Multi-Attach guard
              # from the volume controller already serialised access).
              #
              # Loop a few times in case the previous pod's lockholder PID
              # is still being scrubbed by the kubelet — the PVC mount
              # itself was just attached so any lock file is by definition
              # orphaned.
              for i in 1 2 3; do
                rm -f /data/ipfs/repo.lock /data/ipfs/api
                sleep 1
                if [ ! -f /data/ipfs/repo.lock ]; then
                  break
                fi
              done
              # Pod-local only (kotoba container reaches us via localhost).
              ipfs config Addresses.API     /ip4/127.0.0.1/tcp/5001
              ipfs config Addresses.Gateway /ip4/127.0.0.1/tcp/8081
              ipfs config Datastore.StorageMax 40GB
              # Reduce libp2p chatter so we don't compete with kotoba's own swarm.
              ipfs config --json Swarm.ConnMgr.LowWater  64
              ipfs config --json Swarm.ConnMgr.HighWater 128
              # Reprovide gate (2026-06-03): kotoba writes block-per-ProllyTree-node,
              # so the repo grows to 100k+ CIDs. Default Reprovider.Strategy=all then
              # reprovides every block to the DHT (16s/key) and saturates the local
              # 5001 RPC → kotoba block/put + IPNS publish fail → datomic.transact 500/409
              # → yukkuri produce "compose failed: insert". Reprovide only pinned roots
              # (commit CIDs) + accelerate the DHT client so the storm never starves RPC.
              ipfs config Reprovider.Strategy roots
              ipfs config --json Routing.AcceleratedDHTClient true
              exec ipfs daemon --migrate=true
          env:
            - name: IPFS_PATH
              value: /data/ipfs
          ports:
            - name: ipfs-api
              containerPort: 5001
              protocol: TCP
          # Probes execute inside the container (so they reach the API on
          # 127.0.0.1:5001).  TCP probes would target the pod IP and fail
          # because we deliberately bind the API to localhost only.
          readinessProbe:
            exec:
              command: ["ipfs", "id"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["ipfs", "id"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              memory: "1Gi"
          volumeMounts:
            - name: sled-data
              mountPath: /data/ipfs
              subPath: ipfs

      volumes:
        - name: sled-data
          persistentVolumeClaim:
            claimName: kotoba-sled
