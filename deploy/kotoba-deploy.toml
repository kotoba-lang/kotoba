# Kotoba build/deploy operational contract.
# scripts/build-push.sh and scripts/deploy.sh use these values as their default
# policy; profile fields are operator overrides for a specific cluster.

[image]
repository = "ghcr.io/etzhayyim/kotoba"
default_tag = "latest"
platforms = ["linux/amd64", "linux/arm64"]
pull_secret = "ghcr-creds"

[kubernetes]
namespace = "kotoba"
deployment = "kotoba"
service = "kotoba"
pvc = "kotoba-sled"
forbid_default_namespace = true
required_secret = "kotoba-internal-trust"

[profiles.vke]
storage_class = "vultr-block-storage-hdd-retain"
platforms = ["linux/amd64", "linux/arm64"]

[profiles.orbstack]
storage_class = "local-path"
platforms = ["linux/arm64"]

[verification]
health_url = "http://127.0.0.1:18080/health"
rollout_timeout_seconds = 120
