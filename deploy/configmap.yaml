apiVersion: v1
kind: ConfigMap
metadata:
  name: kotoba-config
  namespace: kotoba
data:
  KOTOBA_PORT: "8080"
  RUST_LOG: "info"

  # Sled block store LRU budget (bytes)
  KOTOBA_STORAGE_BUDGET_BYTES: "8589934592"   # 8 GiB

  # libp2p QUIC listen port
  # KOTOBA_P2P_PORT: "4001"

  # AT Protocol firehose ingest
  # KOTOBA_JETSTREAM: "1"
  # KOTOBA_SUBSCRIBE_REPOS: "1"

  # HTTP inference endpoint (OpenAI-compat: Ollama / vLLM / Vultr A16)
  # KOTOBA_INFERENCE_URL: "http://keiei-llm-pool:11434/v1/chat/completions"
  # KOTOBA_INFERENCE_MODEL: "gemma4:e4b"

  # CC embedding endpoint
  # KOTOBA_EMBED_URL: "http://keiei-llm-pool:11434/v1/embeddings"
  # KOTOBA_EMBED_MODEL: "nomic-embed-text"
  # KOTOBA_EMBED_DIM: "768"
  # KOTOBA_EMBED_BATCH: "64"

  # Storage design (ADR-2605260001):
  #   kotoba  = Sled PVC (primary, durable) — this pod
  #   kotobase = B2 cold-storage pinning service (CF Worker, separate)
  #
  # B2 vars have been removed from kotoba. kotoba is now Sled-only.
  # IPFS secondary pin (optional): set kotoba-ipfs-pin Secret to enable.
  # Secrets (kubectl create secret generic):
  #   kotoba-ipfs-pin  — KOTOBA_IPFS_PIN_ENDPOINT, KOTOBA_IPFS_PIN_JWT
  #   kotoba-vault     — KOTOBA_VAULT_KEY (32-byte hex, email E2E)
