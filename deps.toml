notes = "wasmtime 22 Component Model host; WIT world kotoba:kais@0.1.0; WasmExecutor + UdfExecutor. KNOWN BLOCKER: componentize-py 0.23 emits extended-const expressions (i32.add in global initializers); wasmtime 22 disables EXTENDED_CONST by default and has no public Config API to re-enable it — Python WASM guests fail with CompileFailed('constant expression required: non-constant operator: i32.add'). Rust guest (cargo-component) works correctly. Fix: upgrade wasmtime pin in Cargo.toml to '24' and add config.wasm_extended_const(true) in host.rs KotobaEngine::new() — tracked as TODO comment in that function. Rust guest live-verified on Vultr SJC 2026-05-26: assert_quads=1, total_gas_used=30, status=ok."

[subdirs."crates/kotoba-clj"]
role = "clojure-to-wasm-compiler"
tier = "alpha"
adr = "docs/ADR-clojure-wasm.md"
notes = "Clojure/EDN-subset → WebAssembly compiler (ADR docs/ADR-clojure-wasm.md, 2026-06-08/09; R1 .kotoba runner 2026-06-11). Pipeline: kotoba-edn reader → typed AST → two-pass codegen via wasm-encoder 0.221 → core module; `run` feature instantiates on workspace-pinned wasmtime 22; `component` feature wraps to a WASM Component via wit-component 0.221. Source files: `kotoba-clj app.kotoba [i64 args...]` compiles and invokes exported `main`; `--func` selects another export; `--wasm-out` writes wasm; a leading `#!/usr/bin/env kotoba-clj` shebang is stripped; prelude is on by default (`--no-prelude` for bare compiler surface); extension validation is `.kotoba` unless `--allow-any-ext`. Subset: def/defn/ns, if/when/cond/let/do/loop/recur, + - * / quot mod rem inc dec abs, = not= < > <= >= (n-ary), zero?/pos?/neg?, and/or/not, string literals + str-len/byte-at, byte builder, raw memory, user-fn calls incl. (mutual) recursion; `clojure.core/`-qualified supported builtins resolve to unqualified names. Prelude heap aliases over vector/map handles: count/empty?/nth/first/last/conj!/get/assoc!/contains-key?. Every module exports linear memory + cabi_realloc bump allocator (grows pages). kais-binding workstream: memory+realloc, str/bytes, component list<u8>, host imports, llm.infer, CBOR decode/encode, and defgraph DSL are implemented; compiled Clojure can run on kotoba-runtime, decode CBOR args maps, call llm.infer, and return structured CBOR. Remaining full-fidelity items: complete 3-field InvokeContext wrapper decode, broader kqe/kse/auth host-call builtins, program_cid storage, gas accounting once guests call more host fns, graph_def_cid derivation. Tests: cargo test -p kotoba-clj green including .kotoba file/shebang CLI execution; datomic regression covers clojure.core-qualified collection functions."

