name = "ai-gftd-project-kotoba"
layer = 5
tier = "alpha"
role = "infrastructure-db"
kind = "rust-workspace"
toolchain = "cargo"
maturity = "alpha"
workspace = "standalone"
execution_profiles = ["build", "test", "deploy"]
description = "Kotoba: Content-Addressed Distributed Datalog Database. Datom/EAVT × Pregel BSP × CIDv1 × Datalog on AT Protocol with LLM/weight + WASM Component Model runtime."
language = "rust"

depends_on = [
  "90-docs/adr/2605240001-kotoba-cleanroom-architecture.md",
  "00-contracts/lexicons",
  "90-docs/adr/2605250001-kotoba-selective-sync-storage-budget.md",
  "90-docs/adr/2605250002-kotoba-state-graph-langgraph-api.md",
  "90-docs/adr/2605250004-kotoba-webgpu-training.md",
  "90-docs/adr/2605252000-kotoba-persistence-wal-replay.md",
]

[deployment]
cluster       = "vultr-vke-sjc-31d5f7dc"
namespace     = "kotoba"
image         = "ghcr.io/gftdcojp/kotoba:latest"
build_script  = "60-apps/ai-gftd-project-kotoba/scripts/build-push.sh"
k8s_manifest  = "50-infra/k8s/kotoba/kotoba.yaml"
service       = "LoadBalancer :3000 → pod :8080"
b2_bucket     = "ai-gftd-nats"
b2_stores     = ["kotoba/journal/", "kotoba/blocks/", "kotoba/vault/"]
first_deployed = "2026-05-25"
notes         = "BlockStore priority: LayeredBlockStore(sled primary + B2 fallback) when both KOTOBA_STORE_PATH and KOTOBA_B2_* are set; sled-only or B2-only otherwise. K8s manifest uses emptyDir (no PVC — Vultr block storage subscription limit reached). KG Arrangement persisted via Journal WAL replay on startup; BlockStore blocks persisted via B2 S3 fallback."

[runtime_dependencies.object_storage]
kind = "blob-store"
provider = "b2"
notes = "Journal (kotoba/journal/), BlockStore (kotoba/blocks/), Vault (kotoba/vault/) — all in bucket ai-gftd-nats"

[runtime_dependencies.libp2p]
kind = "p2p-transport"
notes = "QUIC + Noise XX + GossipSub + Kademlia DHT"

[runtime_dependencies.agent_gateway]
kind = "llm-bridge"
notes = "CALL_FOREIGN (0xF) → AgentGateway MCP → Vultr A16 pool (ADR-2605211000)"

adr = "90-docs/adr/2605240001-kotoba-cleanroom-architecture.md"

[files."CLAUDE.md"]
role = "project-rules"
flags = ["editable"]

[files."Cargo.toml"]
role = "workspace-manifest"
flags = ["editable"]

[subdirs."crates/kotoba-core"]
role = "cid-frame-prolly"
tier = "alpha"

[subdirs."crates/kotoba-kse"]
role = "stream-engine"
tier = "alpha"

[subdirs."crates/kotoba-kqe"]
role = "query-engine"
tier = "alpha"

[subdirs."crates/kotoba-dht"]
role = "distributed-hash-table"
tier = "alpha"
notes = "append_verified() enforces Ed25519 sig via ciborium signing_bytes; append() is pub(crate) only"

[subdirs."crates/kotoba-net"]
role = "libp2p-network"
tier = "alpha"

[subdirs."crates/kotoba-auth"]
role = "cacao-auth"
tier = "alpha"

[subdirs."crates/kotoba-graph"]
role = "graph-api"
tier = "alpha"
notes = "QuadStore WAL replay: assert_silent / retract_silent (Arrangement-only, no Journal publish); replay_from_journal() reads all entries from seq=1, deduplicates by CID, applies in seq order. Arrangement.remove() POS invariant fix: SPO + POS both cleaned on retract."

[subdirs."crates/kotoba-vm"]
role = "virtual-machine"
tier = "alpha"
notes = "atomic revert: out_deltas=[] on StepsExceeded; deterministic BSP: inbox + active_ids sorted by CID multibase before each superstep; StateGraph LangGraph-compatible API: StateGraph/CompiledGraph/Thread/Reducer(Override|Append extend)/ToolNode/definition_datoms(); graph_def_cid = shape-only CID (no closures)"

[subdirs."crates/kotoba-llm"]
role = "llm-weight-integration"
tier = "alpha"
notes = "Modules: weight (WeightRef/WeightBlob FP8), lora (LoRA as Delta), kvcache (ephemeral Arrangement per session), embed (Embedding Quad), infer (InferenceRequest/Session), gemma (local Metal, feature=local-inference), http_infer (OpenAI-compat, feature=http-inference), train (TrainBatch/GradientRef/AdamMoments/OptimizerStep Datom types), train_gpu (WebGpuTrainer + WGSL shaders + FP8↔f32 codec, feature=webgpu-train). WebGPU training: Vault FP8 → dequantize → f32 GPU (MATMUL/CE_LOSS/MATMUL_AT/ADAMW) → quantize → Vault FP8; scope = embedding (layer 0) + LM head (layer 1); quality-scaled CE loss; AdamW moments persisted as Datom pairs; weight swap = atomic retract(old)+assert(new) Delta pair. ADR: 2605250004."

[subdirs."crates/kotoba-runtime"]
role = "wasm-component-runtime"
tier = "alpha"
notes = "wasmtime 22 Component Model host; WIT world kotoba:kais@0.1.0; WasmExecutor + UdfExecutor"

[subdirs."crates/kotoba-server"]
role = "xrpc-mcp-server"
tier = "alpha"
notes = "WAL replay on startup via replay_wal() → QuadStore::replay_from_journal() (reads B2 Journal from seq=1, deduplicates by entry CID, applies in seq order). LayeredBlockStore(sled primary + B2 async backup + B2 read fallback). kg.delete XRPC (ai.gftd.apps.yata.kg.delete): retracts all entity quads + publishes Journal retract events. KSE Journal/Vault independently use KOTOBA_B2_* via build_kse_store()."

[subdirs."crates/kotoba-store"]
role = "block-store"
tier = "alpha"
notes = "MemoryBlockStore + SledBlockStore + S3BlockStore + LayeredBlockStore(sled primary + S3 async backup + S3 read fallback + sled write-back); pin/unpin/delete on all impls; BudgetedBlockStore<S> LRU eviction wrapper"

[subdirs."crates/kotoba-store-web"]
role = "browser-block-store"
tier = "alpha"
notes = "wasm32-only; IdbBlockStore over IndexedDB 2-store schema (blocks/meta); AsyncBlockStore trait; pin-aware LRU evict_cold_async(max_bytes)"

[runtime_dependencies.wasmtime]
kind = "wasm-runtime"
version = "22"
features = ["component-model"]
notes = "Cranelift JIT + WIT Component Model for multi-language node programs"
