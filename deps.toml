[subdirs."crates/kotoba-core"]
role = "cid-frame-prolly"
tier = "alpha"
notes = "ProllyTree: build_tree(entries, store)→root_cid (commit), get(root, key, store)→Option<Vec<u8>> (cold-path point-query, 1 BlockStore.get per level). Branching factor ~256 entries/node → depth=ceil(log256(N)). Internal boundary check uses child CID (not max_key — max_key triggers infinite recursion since same key fires at every level; fixed 2026-05-25). Measured cold RTT (2026-05-25, 1K entries): kubo LAN ~3.3ms (3 RTTs), S3 same-AZ ~6ms (3 RTTs), kubo WAN ~175ms (~2 RTTs). Regression tests (2026-05-25): build_tree_1k_terminates_and_get_works / build_tree_10k_terminates / build_tree_get_missing_key / build_tree_single_entry — all pass; any re-introduction of is_boundary(max_key) at internal level causes immediate stack-overflow failure. DataPolicy (2026-05-26): DataPolicy { Open, Encrypted { ct_cid, policy_cid } } — universal encryption-intent type shared across all kotoba crates; placed in kotoba-core (no crypto deps) to avoid circular dependency; is_open()/is_encrypted() accessors; serde default=Open, skip_serializing_if=is_open."

[subdirs."crates/kotoba-kse"]
role = "stream-engine"
tier = "alpha"
status = "journal-deprecated"
notes = "DEPRECATED COMPONENT (2026-06-11): the KSE Journal (WAL/event stream) is deprecated as a canonical/accountability structure — the CommitDag (kotoba-datomic DistributedDatomCommit: content-addressed, parents hash-chain, author-attributed, IPNS-headed, anchorable via audit.anchorPayload) is THE canonical chain. Do not build new features on Journal. Remaining Journal users to migrate to CommitDag-based equivalents: startup WAL replay (replay_from_journal → commit-chain replay), firehose egress (Journal events → CommitDag tx feed), journal_assert_ephemeral in commit_protocol_datoms (drop the double write; KOTOBA_JOURNAL_WAL=off already opts out). Vault/SecureVault/Shelf/PreKeyRegistry in this crate are NOT deprecated. — Full IPLD migration 2026-05-26: Journal (Merkle WAL blocks on Arc<dyn BlockStore>, head JSON file, traverse_chain() cold-path), Vault (file-type chunking: Single<128KB / FixedLen 512KB for video/audio/binary / gear-hash CDC ~256KB for text/JSON / CBOR-item-boundary for dag-cbor; BlobManifest CID for multi-chunk blobs; Vault::flush_as_car() → CAR v1 Bytes), SecureVault (backed via Vault::with_block_store). sled named trees 'journal'/'vault'/'email-vault' removed from server.rs — all KSE shares single block_store. 38 tests pass (chunker + journal + vault + secure_vault + store + sync_window + shelf). PreKeyRegistry (2026-05-26): maps (owner_did, accessor_did) → AES-GCM-wrapped re-encryption key stored in BlockStore; grant()/revoke()/get_rekey_authed(chain)/list_accessors(); re-key = raw data_key (Hybrid PRE: PRE applied only to 32B key, not blob — cost 5ms fixed regardless of blob size); CACAO verification via DelegationChain::verify(owner_did, 'quad:read') before key delivery; AAD = 'owner_did:accessor_did'; 3 tests: roundtrip / revoke / list_accessors. Security fix (2026-05-26): get_rekey_authed and unwrap_rekey now return Zeroizing<Vec<u8>> — data_key bytes are wiped on drop (memset_s equivalent, compiler-optimization-resistant). Security hardening run-2 (2026-05-26): [fix-2] PreKeyRegistry Shelf persistence — with_shelf(Arc<Shelf>) constructor loads index+revocation on startup; grant/revoke persist immediately; Vec<[String;3]>/(Vec<[String;2]>) array-of-tuples format avoids DID colon split_once collision; revoked set checked in get_rekey_authed before BlockStore access; 7 tests: roundtrip/revoke/list_accessors + shelf_persistence_survives_restart + revoked_pair_rejected + emit_warrant_returns_evidence_cid + apply_revocation_warrant_revokes_locally; [fix-7-partial] revoke_emit_warrant() → CBOR RekeyRevocationRecord → block_store.put → evidence KotobaCid; apply_revocation_warrant() deserializes peer warrant and calls revoke_inner(); RULE_REKEY_REVOKED=7 constant exported; [fix-9] SecureVault::put_with_policy(key, plaintext, policy_cid) → (BlobRef, DataPolicy::Encrypted{ct_cid=blob_ref.cid, policy_cid}) — atomically binds ciphertext CID to policy; put_with_policy test added; total 54 tests pass (run-3: +reencrypt_blob / rotate_and_reencrypt_blob_is_accessible_with_new_key)."

[subdirs."crates/kotoba-query"]
# RENAMED from crates/kotoba-kqe (2026-06-12, LLM-readability; lib = kotoba_query, WIT interface kotoba:kais/kqe unchanged)
role = "query-engine"
tier = "alpha"
notes = "4-index Arrangement (EAVT/AEVT/AVET/VAET, Datomic-equivalent). VAET ref-only gate (QuadObject::Cid). criterion bench: arrangement.rs — insert(1K/10K/100K), SPO/PSO/POS/OCP lookup, prefix scan, multi-hop traversal, AVET join, population count, star pattern, reverse fan-in. Measured 2026-05-25 (aarch64): EAVT ~180ns, AEVT ~8µs, AVET ~18µs, VAET ~147µs, 2-hop ~748ns, 3-hop ~1.16µs, join(AVET×2) ~783µs, pop-count(50K) ~47ms, star(20pred) ~6.4µs, fan-in(5K) ~76µs. QuadObject::Encrypted (2026-05-26): Encrypted { ct_cid, policy_cid } variant for PRE-protected quad values; spo_key() uses ct_cid for dedup; VAET naturally skips (only QuadObject::Cid indexed for reverse-ref); AVET object_key() returns 'enc:{ct_cid_multibase}' — value search disabled by design (encrypted object is not queryable by value). Enterprise SQL dialect layer (2026-05-26): crates/kotoba-query/src/enterprise/ — 10 dialects compile enterprise SQL into DatalogProgram + PostProcess via SchemaBasedSqlCompiler (EAV projection: N-col table → binary predicates 'table/col(entity_cid, value_cid)'). Dialects: Oracle (ROWNUM/CONNECT BY/NVL, GenericDialect), T-SQL (TOP/NOLOCK/CROSS APPLY, MsSqlDialect), SAP HANA (TOP START AT/CE_PROJECTION, GenericDialect), IBM Db2 (FETCH FIRST/isolation stripping, GenericDialect), Teradata (SEL/SAMPLE/QUALIFY/ZEROIFNULL, GenericDialect), Snowflake (QUALIFY/FLATTEN/ILIKE/COPY INTO guard, SnowflakeDialect), BigQuery (backtick idents/UNNEST/EXCEPT, BigQueryDialect), Presto/Trino (TABLESAMPLE BERNOULLI/UNNEST/TRY, GenericDialect), MDX (hand-written recursive-descent parser; cube→named-graph; measure→predicate; dimension→CID), HiveQL (TABLESAMPLE BUCKET/LATERAL VIEW/CLUSTER BY, HiveDialect). PostProcess carries LIMIT/OFFSET/ORDER BY/SAMPLE directives applied post evaluate_delta(). EnterpriseFeature enum: HierarchicalQuery/Pivot/OlapWindow/Sampling/SemiStructured/Temporal/Lateral/MacroExpansion. SchemaMap/TableSchema/AttrDef(Entity|Scalar|Numeric|FK) drive EAV expansion. Datalog safety limits (2026-05-27): MAX_DATALOG_ITERATIONS=1_000 and MAX_DERIVED_FACTS=1_000_000 in evaluate_delta() — aborts fixpoint with tracing::warn! if exceeded, prevents infinite-loop/OOM from recursive rules. Security fix (2026-05-27): royalty_quads() citation_count/royalty_mkoto (Mkoto=u64) cast to i64 via i64::try_from().unwrap_or(i64::MAX) — saturation semantics replace silent truncation; overflow was possible for pool ≥ 2^63 Mkoto. 3 regression tests. Test hardening run-7 (2026-05-27): citation ledger invariants — royalty_sum_never_exceeds_pool (7 citations/3 datoms ≤ 1M pool), sole_citation_gets_full_pool (1/1 = 5M mKOTO), equal_citations_approximately_equal (2×~500K ±1), multi_epoch_counter_resets. 194 tests pass (2026-05-27)."

[subdirs."crates/kotoba-dht"]
role = "distributed-hash-table"
tier = "alpha"
notes = "append_verified() enforces Ed25519 sig via ciborium signing_bytes; append() is pub(crate) only. ChainEntry.policy (2026-05-26): DataPolicy field on ChainEntry with serde(default, skip_serializing_if=is_open) — backward-compatible with existing committed CIDs; new_with_policy() constructor; Open entries gossip plaintext payload, Encrypted entries gossip only ct_cid (plaintext never leaves the owning node). Security fix (2026-05-26): policy field added to SigningPayload — {prev,agent,seq,content,ts,policy} — preventing silent Encrypted→Open downgrade without signature invalidation; test verify_sig_tampered_policy_fails added. Security hardening run-2 (2026-05-26): ValidationRule::RekeyRevoked=7 added to warrant.rs — PRE re-key grant revoked by owner; evidence block = CBOR RekeyRevocationRecord; K/2 warrants → peer eviction of cached grant; GossipSub wire integration remains Phase 6+."

[subdirs."crates/kotoba-net"]
role = "libp2p-network"
tier = "alpha"

[subdirs."crates/kotoba-auth"]
role = "cacao-auth"
tier = "alpha"
notes = "Security fix (2026-05-26): DelegationChain::verify now enforces both capability and graph scope — previously _graph_cid and _required_cap were underscore-prefixed and silently ignored. Now: (1) kotoba://can/{cap} resource must match required_cap if present; (2) kotoba://graph/{cid} resource must match graph_cid argument if present; (3) absent resources = 'all caps/graphs granted' (backward compat). DelegationError::GraphMismatch { expected, got } variant added. Expiry check was already functional. Security hardening run-3 (2026-05-26): [fix-4+fix-10] DidDocumentResolver trait + InMemoryDidResolver in resolver.rs; DidDocument::x25519_public_key() extracts X25519KeyAgreementKey2020 verificationMethod via multibase::decode; DidResolverError::{NotFound,NoX25519Key} variants; 33 auth tests pass. [fix-4 kotoba-server] PreProxy now holds Arc<dyn DidDocumentResolver>; reencrypt_for() resolves accessor_did DID Document and hard-errors (PkMismatch) if requester_pk != registered X25519 key — no silent fallback; 35 server tests pass. [fix-8] SovereignCrypto::reencrypt_blob(old_crypto, scope, old_ct) decrypts with pre-rotation key (Zeroizing intermediate) and encrypts with post-rotation key; test rotate_and_reencrypt_blob_is_accessible_with_new_key; 54 kse tests pass. Passkey gate (2026-05-26, ADR-2605260005): passkey.rs — PasskeyAssertion (WebAuthn ceremony result), KeyOpKind(WebLogin/SiweSign/EthereumTxLow/EthereumTxHigh/SignalKeyUnlock/StorageKeyDecrypt/AddDevice/RecoveryKeyAccess), AuthLevel(UserPresence/UserVerified/UserVerifiedHighValue), KeyOpPolicy(default TTL+max_age map), PasskeyGate::authorize()→Authorization{op,expires_at,nonce}, KeyHierarchy(CID refs only — no plaintext keys). Passkey is authentication gate, not signing key — purpose-isolated keys hang off it. Security hardening run-5 (2026-05-26): verify_with_aud(graph_cid, required_cap, expected_aud) — rejects empty aud (audience bypass prevention); did:web response-bomb guard >64KiB; DelegationError::AudienceMismatch{expected,got}; graph_auth::AccessDenied::AudienceMismatch; all kg.rs+xrpc.rs callers pass state.operator_did as expected_aud. 61 kotoba-auth tests pass."

[subdirs."crates/kotoba-graph"]
role = "graph-api"
tier = "alpha"
notes = "QuadStore WAL replay: assert_silent / retract_silent (Arrangement-only, no Journal publish); assert_batch_silent(Vec<Quad>) for O(1)-lock bulk ingest. replay_from_journal() reads all entries from seq=1, deduplicates by CID, applies in seq order. commit() spawns 4 parallel 64MB-stack threads (one per EAVT/AEVT/AVET/VAET), each with a CapturingBlockStore wrapper — passes writes through to hot store AND records blocks for CAR bundling. After all 4 roots complete, CarBundleWriter packs all captured blocks into a single ~64MB CAR (1M quads) stored as one content-addressed block (enables single cold PUT vs ~16K individual S3 PUTs). Expected commit speedup: ~4.7s → ~1.5–2s on 4-core. ProllyTree::get(root,key,store) point-query (cold-read path: 1 BlockStore.get per tree level). Bench: quad_store.rs — insert_per_quad/insert_batch/insert_batch_chunked + query_hot + query_cold_prolly_1k. Measured 2026-05-25: insert_per_quad 130K q/s, insert_batch 180K q/s, loadtest 1M@290K q/s. Cold-path: kubo_lan ~3.3ms, s3_same_az ~6.0ms, kubo_wan ~175ms (~3 tree levels). ProllyTree boundary fix: use child CID not max_key (infinite recursion fix 2026-05-25). assert_authed (2026-05-26): CACAO-gated quad write — chain.verify(graph_mb, 'quad:write') before assert(); AccessError::Delegation on failure; server-internal writes still use assert() directly. Security fix (2026-05-26): assert_authed now passes quad.graph CID (was incorrectly passing quad.subject) — CACAO kotoba://graph/{cid} scope check now correctly targets the named graph. CommitDag ancestor pruning (2026-05-26): CommitDag::prune_non_head(before_seq)→usize removes non-HEAD commits with seq<before_seq (HEAD always retained for GC root safety); CommitDag::commit_count()→usize; QuadStore::prune_old_commits(before_seq)→usize delegate. Security fix (2026-05-27): cbor_i64() — i128→i64 silent truncation replaced by i64::try_from(i128::from(*i)).ok() (returns None for >i64::MAX). seq extraction — negative-seq wrap attack fixed: `as u64` replaced by `.and_then(|v| u64::try_from(v).ok()).unwrap_or(0)`; a rogue relay sending seq=-1 would have corrupted the firehose cursor to u64::MAX. 3 regression tests. Cold-path AEVT/AVET/VAET queries (2026-05-27): quads_by_predicate_prefix_cold(graph, pred_prefix)→Vec<Quad> (AEVT scan, key=pred_bytes||subj[36]); lookup_subject_by_po_cold(graph, pred, obj_key)→Vec<KotobaCid> (AVET scan, key=pred_bytes||obj_key_bytes, val=subj[36]); reverse_lookup_cold(graph, obj_cid)→Vec<(String,KotobaCid)> (VAET scan, key=ocid[36]||pred_bytes, val=subj[36]). All three: hot-path short-circuit when Arrangement is non-empty; spawn_blocking ProllyTree::scan_prefix otherwise. Complete 4-index cold coverage after reset_arrangement(). Complex cold queries (2026-05-27): multi_hop_cold(graph, start, max_hops)→Vec<(usize,Quad)> (BFS via QuadObject::Cid refs, visited-set dedup, depth tag per result); join_by_two_predicates_cold(graph, pred1, val1, pred2, val2)→Vec<KotobaCid> (AVET×AVET HashSet intersection). CACAO-authed cold variants (2026-05-27): get_entity_quads_cold_authed / quads_by_predicate_prefix_cold_authed / lookup_subject_by_po_cold_authed / multi_hop_cold_authed — each calls chain.verify(graph_mb, 'quad:read') before delegating to unauthed cold method; AccessError::Delegation on failure, ::Internal on store error. kotoba-auth test-utils feature: DelegationChain::new_for_test(graph_cid, capability) builds CACAO with fake sig for cross-crate tests; verify_skip_sig() checks temporal/capability/graph scope without crypto. Bench extensions (2026-05-27): cold_eavt / cold_aevt / cold_avet / cold_vaet / cold_multi_hop bench groups (kubo-LAN 1ms / kubo-WAN 80ms / S3 2ms RTT). Loadtest Phase 3 (2026-05-27): cold-path query section after commit over 100K entities — EAVT/AEVT/AVET/VAET/multi-hop 2-hop&3-hop/join; all sub-ms on MemoryBlockStore. 101 kotoba-graph tests pass. CACAO-gated batch insert (2026-05-27): assert_batch_authed(quads,chain) verifies chain.verify('quad:write') for all unique graph CIDs in batch upfront — atomic rejection if any scope fails; returns Ok(n_quads) on success; 4 tests (wrong-cap/wrong-graph/sig-step/cross-graph-multi-graph-chain). Distributed query infrastructure (2026-05-27): DistributedBlockStore (kotoba-store) — local-first multi-peer block fetch; get() checks local then fans out to peer Kubo HTTP /api/v0/block/get; on peer hit promotes block to local cache; from_env(KOTOBA_PEERS), from_peers_str(str,local); 8 unit tests; pub use from lib.rs. Loadtest Phase 4 (2026-05-27): simulated 2-node cluster — node B commits 10K-entity graph, node A queries cold via DistributedBlockStore; 293 blocks bulk-copied (simulates peer HTTP fetch); first-access and promoted latency measured; notes real path via KOTOBA_PEERS env var. SPARQL BGP cold-path router (2026-05-27): cold_query_sparql_bgp(graph, sparql)→Vec<Quad> routes SELECT BGP to optimal index — bound subject → EAVT, bound pred+literal → AVET, bound pred only → AEVT, bound object CID → VAET, 2-triple join → join_by_two_predicates_cold; SPARQL_BGP_BASE_IRI='k:' allows relative IRIs like <role>; strip_bgp_base() strips prefix; synthetic Quad results for AVET/VAET/join. CACAO variant: cold_query_sparql_bgp_authed(graph, sparql, chain) verifies quad:read before routing. 8 tests: AVET/AEVT/EAVT/VAET routing, 2-triple join, join-no-overlap, authed-rejected (wrong-cap + wrong-graph). import_commit() distributed E2E (2026-05-27): QuadStore::import_commit(commit_cid)→bool loads Commit block from BlockStore → CommitDag.add(); enables block-replicate-then-query without re-running commit(); 2 tests (import_commit_makes_graph_queryable, import_commit_missing_block_returns_false); criterion bench insert_batch_authed added (verify_skip_sig + assert_batch_silent, <1µs auth overhead). CACAO EdDSA E2E (2026-05-27): make_real_eddsa_cacao() helper builds real-signed DelegationChain; sparql_bgp_authed_real_sig_succeeds (AVET cold-path, returns 2 admin rows); get_entity_quads_cold_authed_real_sig_succeeds (EAVT cold-path); both pass DelegationChain::verify() with real Ed25519 sig. SPARQL FILTER/UNION/OPTIONAL (2026-05-27): cold_query_sparql_bgp refactored to recursive execute_sparql_graph_pattern dispatching BGP/Filter/Union/LeftJoin; route_bgp_triples extracted for 1-triple and 2-triple index routing; eval_filter_expr handles Not/Or/And/Equal/Greater/Less/Contains/StrStarts; Union merge-dedup; LeftJoin left-outer-join by subject overlap; 4 tests (filter_not_equal, filter_contains, union, optional); spargebra NotEqual absent — != value is Not(Equal(...)). 117 kotoba-graph tests pass. SPARQL Property Paths (2026-05-27): GraphPattern::Path dispatched to eval_property_path; OneOrMore(pred) → BFS ≥1 hop via bfs_pred_path; ZeroOrMore(pred) → BFS ≥0 hops + start quads; Sequence(A,B) → 1+1 hop predicate chaining; bare NamedNode → single-hop; 3 tests (one_or_more alice→bob via knows+, zero_or_more_includes_start, no_cid_edges_returns_empty); helper functions extract_named_node_from_path + path_name. 120 kotoba-graph tests pass. SPARQL Join+Aggregates (2026-05-28): GraphPattern::Join (inner-join by shared subjects, strips Project wrappers); Group (COUNT(*) grouped by object value, global aggregate for empty variables); Extend (renames internal UUID agg var to user name); 3 tests (explicit_join_subquery→Bob excluded, aggregate_count_by_role→admin=2/user=1, aggregate_count_all→total=3). 123 kotoba-graph tests pass. Loadtest Phase 6 (2026-05-28): property-path BFS (knows+ 11ms/5 hops, knows* 14ms/7 quads); GROUP BY COUNT 26ms/3 groups; global COUNT 24ms/1 row; subquery JOIN 205ms/6668 rows; CACAO-authed JOIN 215ms/+10ms overhead (verify_skip_sig). SPARQL Minus+VALUES+OrderBy/Slice (2026-05-28): Minus (set difference by subject exclusion); Values standalone + Join{left:Values} short-circuit (object-value filter via all_allowed HashSet); OrderBy (sort by object text ASC/DESC); Slice (LIMIT start/length skip+take); ground_term_to_str() via Literal::value(); 8 new tests (minus×2, values×3, orderby×3); sparql_dbg3.rs removed. 131 kotoba-graph tests pass. Real EdDSA CACAO aggregate+MINUS+OrderBy-Limit E2E (2026-05-28): 3 sparql_authed_real_sig_* tests via cold_query_sparql_bgp_authed with real Ed25519 sig. Phase 7 loadtest (2026-05-28, 10K entities): MINUS 33ms/6667, VALUES-1val 24ms/3334, VALUES-2val 21ms/6667, ORDER-BY-LIMIT-10 23ms/10, real-EdDSA-COUNT 17ms/1, real-EdDSA-GROUP-BY 17ms/3, distributed-GROUP-BY-1K 2.5ms/3. 134 kotoba-graph tests pass."

