[subdirs."crates/kotoba-core"]
role = "cid-frame-prolly"
tier = "alpha"
notes = "ProllyTree: build_tree(entries, store)→root_cid (commit), get(root, key, store)→Option<Vec<u8>> (cold-path point-query, 1 BlockStore.get per level). Branching factor ~256 entries/node → depth=ceil(log256(N)). Internal boundary check uses child CID (not max_key — max_key triggers infinite recursion since same key fires at every level; fixed 2026-05-25). Measured cold RTT (2026-05-25, 1K entries): kubo LAN ~3.3ms (3 RTTs), S3 same-AZ ~6ms (3 RTTs), kubo WAN ~175ms (~2 RTTs). Regression tests (2026-05-25): build_tree_1k_terminates_and_get_works / build_tree_10k_terminates / build_tree_get_missing_key / build_tree_single_entry — all pass; any re-introduction of is_boundary(max_key) at internal level causes immediate stack-overflow failure. DataPolicy (2026-05-26): DataPolicy { Open, Encrypted { ct_cid, policy_cid } } — universal encryption-intent type shared across all kotoba crates; placed in kotoba-core (no crypto deps) to avoid circular dependency; is_open()/is_encrypted() accessors; serde default=Open, skip_serializing_if=is_open."

[subdirs."crates/kotoba-kse"]
role = "stream-engine"
tier = "alpha"
notes = "Full IPLD migration 2026-05-26: Journal (Merkle WAL blocks on Arc<dyn BlockStore>, head JSON file, traverse_chain() cold-path), Vault (file-type chunking: Single<128KB / FixedLen 512KB for video/audio/binary / gear-hash CDC ~256KB for text/JSON / CBOR-item-boundary for dag-cbor; BlobManifest CID for multi-chunk blobs; Vault::flush_as_car() → CAR v1 Bytes), SecureVault (backed via Vault::with_block_store). sled named trees 'journal'/'vault'/'email-vault' removed from server.rs — all KSE shares single block_store. 38 tests pass (chunker + journal + vault + secure_vault + store + sync_window + shelf). PreKeyRegistry (2026-05-26): maps (owner_did, accessor_did) → AES-GCM-wrapped re-encryption key stored in BlockStore; grant()/revoke()/get_rekey_authed(chain)/list_accessors(); re-key = raw data_key (Hybrid PRE: PRE applied only to 32B key, not blob — cost 5ms fixed regardless of blob size); CACAO verification via DelegationChain::verify(owner_did, 'quad:read') before key delivery; AAD = 'owner_did:accessor_did'; 3 tests: roundtrip / revoke / list_accessors. Security fix (2026-05-26): get_rekey_authed and unwrap_rekey now return Zeroizing<Vec<u8>> — data_key bytes are wiped on drop (memset_s equivalent, compiler-optimization-resistant). Security hardening run-2 (2026-05-26): [fix-2] PreKeyRegistry Shelf persistence — with_shelf(Arc<Shelf>) constructor loads index+revocation on startup; grant/revoke persist immediately; Vec<[String;3]>/(Vec<[String;2]>) array-of-tuples format avoids DID colon split_once collision; revoked set checked in get_rekey_authed before BlockStore access; 7 tests: roundtrip/revoke/list_accessors + shelf_persistence_survives_restart + revoked_pair_rejected + emit_warrant_returns_evidence_cid + apply_revocation_warrant_revokes_locally; [fix-7-partial] revoke_emit_warrant() → CBOR RekeyRevocationRecord → block_store.put → evidence KotobaCid; apply_revocation_warrant() deserializes peer warrant and calls revoke_inner(); RULE_REKEY_REVOKED=7 constant exported; [fix-9] SecureVault::put_with_policy(key, plaintext, policy_cid) → (BlobRef, DataPolicy::Encrypted{ct_cid=blob_ref.cid, policy_cid}) — atomically binds ciphertext CID to policy; put_with_policy test added; total 54 tests pass (run-3: +reencrypt_blob / rotate_and_reencrypt_blob_is_accessible_with_new_key)."

[subdirs."crates/kotoba-kqe"]
role = "query-engine"
tier = "alpha"
notes = "4-index Arrangement (EAVT/AEVT/AVET/VAET, Datomic-equivalent). VAET ref-only gate (QuadObject::Cid). criterion bench: arrangement.rs — insert(1K/10K/100K), SPO/PSO/POS/OCP lookup, prefix scan, multi-hop traversal, AVET join, population count, star pattern, reverse fan-in. Measured 2026-05-25 (aarch64): EAVT ~180ns, AEVT ~8µs, AVET ~18µs, VAET ~147µs, 2-hop ~748ns, 3-hop ~1.16µs, join(AVET×2) ~783µs, pop-count(50K) ~47ms, star(20pred) ~6.4µs, fan-in(5K) ~76µs. QuadObject::Encrypted (2026-05-26): Encrypted { ct_cid, policy_cid } variant for PRE-protected quad values; spo_key() uses ct_cid for dedup; VAET naturally skips (only QuadObject::Cid indexed for reverse-ref); AVET object_key() returns 'enc:{ct_cid_multibase}' — value search disabled by design (encrypted object is not queryable by value). Enterprise SQL dialect layer (2026-05-26): crates/kotoba-kqe/src/enterprise/ — 10 dialects compile enterprise SQL into DatalogProgram + PostProcess via SchemaBasedSqlCompiler (EAV projection: N-col table → binary predicates 'table/col(entity_cid, value_cid)'). Dialects: Oracle (ROWNUM/CONNECT BY/NVL, GenericDialect), T-SQL (TOP/NOLOCK/CROSS APPLY, MsSqlDialect), SAP HANA (TOP START AT/CE_PROJECTION, GenericDialect), IBM Db2 (FETCH FIRST/isolation stripping, GenericDialect), Teradata (SEL/SAMPLE/QUALIFY/ZEROIFNULL, GenericDialect), Snowflake (QUALIFY/FLATTEN/ILIKE/COPY INTO guard, SnowflakeDialect), BigQuery (backtick idents/UNNEST/EXCEPT, BigQueryDialect), Presto/Trino (TABLESAMPLE BERNOULLI/UNNEST/TRY, GenericDialect), MDX (hand-written recursive-descent parser; cube→named-graph; measure→predicate; dimension→CID), HiveQL (TABLESAMPLE BUCKET/LATERAL VIEW/CLUSTER BY, HiveDialect). PostProcess carries LIMIT/OFFSET/ORDER BY/SAMPLE directives applied post evaluate_delta(). EnterpriseFeature enum: HierarchicalQuery/Pivot/OlapWindow/Sampling/SemiStructured/Temporal/Lateral/MacroExpansion. SchemaMap/TableSchema/AttrDef(Entity|Scalar|Numeric|FK) drive EAV expansion. Datalog safety limits (2026-05-27): MAX_DATALOG_ITERATIONS=1_000 and MAX_DERIVED_FACTS=1_000_000 in evaluate_delta() — aborts fixpoint with tracing::warn! if exceeded, prevents infinite-loop/OOM from recursive rules. Security fix (2026-05-27): royalty_quads() citation_count/royalty_mkoto (Mkoto=u64) cast to i64 via i64::try_from().unwrap_or(i64::MAX) — saturation semantics replace silent truncation; overflow was possible for pool ≥ 2^63 Mkoto. 3 regression tests. Test hardening run-7 (2026-05-27): citation ledger invariants — royalty_sum_never_exceeds_pool (7 citations/3 datoms ≤ 1M pool), sole_citation_gets_full_pool (1/1 = 5M mKOTO), equal_citations_approximately_equal (2×~500K ±1), multi_epoch_counter_resets. 194 tests pass (2026-05-27)."

[subdirs."crates/kotoba-dht"]
role = "distributed-hash-table"
tier = "alpha"
notes = "append_verified() enforces Ed25519 sig via ciborium signing_bytes; append() is pub(crate) only. ChainEntry.policy (2026-05-26): DataPolicy field on ChainEntry with serde(default, skip_serializing_if=is_open) — backward-compatible with existing committed CIDs; new_with_policy() constructor; Open entries gossip plaintext payload, Encrypted entries gossip only ct_cid (plaintext never leaves the owning node). Security fix (2026-05-26): policy field added to SigningPayload — {prev,agent,seq,content,ts,policy} — preventing silent Encrypted→Open downgrade without signature invalidation; test verify_sig_tampered_policy_fails added. Security hardening run-2 (2026-05-26): ValidationRule::RekeyRevoked=7 added to warrant.rs — PRE re-key grant revoked by owner; evidence block = CBOR RekeyRevocationRecord; K/2 warrants → peer eviction of cached grant; GossipSub wire integration remains Phase 6+."

[subdirs."crates/kotoba-net"]
role = "libp2p-network"
tier = "alpha"

[subdirs."crates/kotoba-auth"]
role = "cacao-auth"
tier = "alpha"
notes = "Security fix (2026-05-26): DelegationChain::verify now enforces both capability and graph scope — previously _graph_cid and _required_cap were underscore-prefixed and silently ignored. Now: (1) kotoba://can/{cap} resource must match required_cap if present; (2) kotoba://graph/{cid} resource must match graph_cid argument if present; (3) absent resources = 'all caps/graphs granted' (backward compat). DelegationError::GraphMismatch { expected, got } variant added. Expiry check was already functional. Security hardening run-3 (2026-05-26): [fix-4+fix-10] DidDocumentResolver trait + InMemoryDidResolver in resolver.rs; DidDocument::x25519_public_key() extracts X25519KeyAgreementKey2020 verificationMethod via multibase::decode; DidResolverError::{NotFound,NoX25519Key} variants; 33 auth tests pass. [fix-4 kotoba-server] PreProxy now holds Arc<dyn DidDocumentResolver>; reencrypt_for() resolves accessor_did DID Document and hard-errors (PkMismatch) if requester_pk != registered X25519 key — no silent fallback; 35 server tests pass. [fix-8] SovereignCrypto::reencrypt_blob(old_crypto, scope, old_ct) decrypts with pre-rotation key (Zeroizing intermediate) and encrypts with post-rotation key; test rotate_and_reencrypt_blob_is_accessible_with_new_key; 54 kse tests pass. Passkey gate (2026-05-26, ADR-2605260005): passkey.rs — PasskeyAssertion (WebAuthn ceremony result), KeyOpKind(WebLogin/SiweSign/EthereumTxLow/EthereumTxHigh/SignalKeyUnlock/StorageKeyDecrypt/AddDevice/RecoveryKeyAccess), AuthLevel(UserPresence/UserVerified/UserVerifiedHighValue), KeyOpPolicy(default TTL+max_age map), PasskeyGate::authorize()→Authorization{op,expires_at,nonce}, KeyHierarchy(CID refs only — no plaintext keys). Passkey is authentication gate, not signing key — purpose-isolated keys hang off it. Security hardening run-5 (2026-05-26): verify_with_aud(graph_cid, required_cap, expected_aud) — rejects empty aud (audience bypass prevention); did:web response-bomb guard >64KiB; DelegationError::AudienceMismatch{expected,got}; graph_auth::AccessDenied::AudienceMismatch; all kg.rs+xrpc.rs callers pass state.operator_did as expected_aud. 61 kotoba-auth tests pass."

[subdirs."crates/kotoba-graph"]
role = "graph-api"
tier = "alpha"
notes = "QuadStore WAL replay: assert_silent / retract_silent (Arrangement-only, no Journal publish); assert_batch_silent(Vec<Quad>) for O(1)-lock bulk ingest. replay_from_journal() reads all entries from seq=1, deduplicates by CID, applies in seq order. commit() spawns 4 parallel 64MB-stack threads (one per EAVT/AEVT/AVET/VAET), each with a CapturingBlockStore wrapper — passes writes through to hot store AND records blocks for CAR bundling. After all 4 roots complete, CarBundleWriter packs all captured blocks into a single ~64MB CAR (1M quads) stored as one content-addressed block (enables single cold PUT vs ~16K individual S3 PUTs). Expected commit speedup: ~4.7s → ~1.5–2s on 4-core. ProllyTree::get(root,key,store) point-query (cold-read path: 1 BlockStore.get per tree level). Bench: quad_store.rs — insert_per_quad/insert_batch/insert_batch_chunked + query_hot + query_cold_prolly_1k. Measured 2026-05-25: insert_per_quad 130K q/s, insert_batch 180K q/s, loadtest 1M@290K q/s. Cold-path: kubo_lan ~3.3ms, s3_same_az ~6.0ms, kubo_wan ~175ms (~3 tree levels). ProllyTree boundary fix: use child CID not max_key (infinite recursion fix 2026-05-25). assert_authed (2026-05-26): CACAO-gated quad write — chain.verify(graph_mb, 'quad:write') before assert(); AccessError::Delegation on failure; server-internal writes still use assert() directly. Security fix (2026-05-26): assert_authed now passes quad.graph CID (was incorrectly passing quad.subject) — CACAO kotoba://graph/{cid} scope check now correctly targets the named graph. CommitDag ancestor pruning (2026-05-26): CommitDag::prune_non_head(before_seq)→usize removes non-HEAD commits with seq<before_seq (HEAD always retained for GC root safety); CommitDag::commit_count()→usize; QuadStore::prune_old_commits(before_seq)→usize delegate. Security fix (2026-05-27): cbor_i64() — i128→i64 silent truncation replaced by i64::try_from(i128::from(*i)).ok() (returns None for >i64::MAX). seq extraction — negative-seq wrap attack fixed: `as u64` replaced by `.and_then(|v| u64::try_from(v).ok()).unwrap_or(0)`; a rogue relay sending seq=-1 would have corrupted the firehose cursor to u64::MAX. 3 regression tests. Cold-path AEVT/AVET/VAET queries (2026-05-27): quads_by_predicate_prefix_cold(graph, pred_prefix)→Vec<Quad> (AEVT scan, key=pred_bytes||subj[36]); lookup_subject_by_po_cold(graph, pred, obj_key)→Vec<KotobaCid> (AVET scan, key=pred_bytes||obj_key_bytes, val=subj[36]); reverse_lookup_cold(graph, obj_cid)→Vec<(String,KotobaCid)> (VAET scan, key=ocid[36]||pred_bytes, val=subj[36]). All three: hot-path short-circuit when Arrangement is non-empty; spawn_blocking ProllyTree::scan_prefix otherwise. Complete 4-index cold coverage after reset_arrangement(). Complex cold queries (2026-05-27): multi_hop_cold(graph, start, max_hops)→Vec<(usize,Quad)> (BFS via QuadObject::Cid refs, visited-set dedup, depth tag per result); join_by_two_predicates_cold(graph, pred1, val1, pred2, val2)→Vec<KotobaCid> (AVET×AVET HashSet intersection). CACAO-authed cold variants (2026-05-27): get_entity_quads_cold_authed / quads_by_predicate_prefix_cold_authed / lookup_subject_by_po_cold_authed / multi_hop_cold_authed — each calls chain.verify(graph_mb, 'quad:read') before delegating to unauthed cold method; AccessError::Delegation on failure, ::Internal on store error. kotoba-auth test-utils feature: DelegationChain::new_for_test(graph_cid, capability) builds CACAO with fake sig for cross-crate tests; verify_skip_sig() checks temporal/capability/graph scope without crypto. Bench extensions (2026-05-27): cold_eavt / cold_aevt / cold_avet / cold_vaet / cold_multi_hop bench groups (kubo-LAN 1ms / kubo-WAN 80ms / S3 2ms RTT). Loadtest Phase 3 (2026-05-27): cold-path query section after commit over 100K entities — EAVT/AEVT/AVET/VAET/multi-hop 2-hop&3-hop/join; all sub-ms on MemoryBlockStore. 101 kotoba-graph tests pass. CACAO-gated batch insert (2026-05-27): assert_batch_authed(quads,chain) verifies chain.verify('quad:write') for all unique graph CIDs in batch upfront — atomic rejection if any scope fails; returns Ok(n_quads) on success; 4 tests (wrong-cap/wrong-graph/sig-step/cross-graph-multi-graph-chain). Distributed query infrastructure (2026-05-27): DistributedBlockStore (kotoba-store) — local-first multi-peer block fetch; get() checks local then fans out to peer Kubo HTTP /api/v0/block/get; on peer hit promotes block to local cache; from_env(KOTOBA_PEERS), from_peers_str(str,local); 8 unit tests; pub use from lib.rs. Loadtest Phase 4 (2026-05-27): simulated 2-node cluster — node B commits 10K-entity graph, node A queries cold via DistributedBlockStore; 293 blocks bulk-copied (simulates peer HTTP fetch); first-access and promoted latency measured; notes real path via KOTOBA_PEERS env var. SPARQL BGP cold-path router (2026-05-27): cold_query_sparql_bgp(graph, sparql)→Vec<Quad> routes SELECT BGP to optimal index — bound subject → EAVT, bound pred+literal → AVET, bound pred only → AEVT, bound object CID → VAET, 2-triple join → join_by_two_predicates_cold; SPARQL_BGP_BASE_IRI='k:' allows relative IRIs like <role>; strip_bgp_base() strips prefix; synthetic Quad results for AVET/VAET/join. CACAO variant: cold_query_sparql_bgp_authed(graph, sparql, chain) verifies quad:read before routing. 8 tests: AVET/AEVT/EAVT/VAET routing, 2-triple join, join-no-overlap, authed-rejected (wrong-cap + wrong-graph). 109 kotoba-graph tests pass."

[subdirs."crates/kotoba-vm"]
role = "virtual-machine"
tier = "alpha"
notes = "atomic revert: out_deltas=[] on StepsExceeded; deterministic BSP: inbox + active_ids sorted by CID multibase before each superstep; StateGraph LangGraph-compatible API: StateGraph/CompiledGraph/Thread/Reducer(Override|Append extend)/ToolNode/definition_datoms(); graph_def_cid = shape-only CID (no closures). auth_actor (2026-05-26): Actor-first crypto-unaware Pregel types — Actor { vertex_cid, did, public_key:[u8;32] (X25519), state, caps:Vec<DelegationChain> }; AuthMessage { src_did, payload (always plaintext — PRE proxy decrypted at node boundary), cap }; AuthOutMessage { dst_did, payload (plaintext — node encrypts per policy), policy:DataPolicy, cap }; AuthQuad { quad, policy, chain }; ActorOutput { new_state, messages:Vec<AuthOutMessage>, assertions:Vec<AuthQuad>, vote_halt }; ActorComputeFn = Arc<dyn Fn(&Actor,&[AuthMessage])->ActorOutput+Send+Sync>. CBOR error path fix (2026-05-27): WasmPregelRunner error path now writes ciborium-encoded {\"err\": \"...\"}  into final_output_cbor (was raw JSON bytes — caused decode failure at MCP output_cbor_b64 boundary)."

[subdirs."crates/kotoba-llm"]
role = "llm-weight-integration"
tier = "alpha"
notes = "Modules: weight (WeightKind enum + WeightRef/WeightBlob FP8), lora (LoRA as Delta), kvcache (ephemeral Arrangement per session), embed (Embedding Quad), infer (InferenceRequest/Session), gemma (local Metal, feature=local-inference), http_infer (OpenAI-compat, feature=http-inference), train (TrainBatch/GradientRef/AdamMoments/OptimizerStep; WeightKind-predicated Datom types), gpu_common (FP8 codec + MATMUL_WGSL; always compiled), train_gpu (WebGpuTrainer + CE_LOSS/MATMUL_AT/ADAMW WGSL, feature=webgpu-train), infer_gpu (WebGpuInferSession + RMS_NORM/ROPE/ATTENTION/SWIGLU_FFN/SAMPLE WGSL + CPU kernels, feature=webgpu-infer). Unified predicate scheme: weight/embed, weight/lm_head, weight/block/{N}/attn/{q,k,v,o}, weight/block/{N}/ffn/{gate,up,down}, weight/block/{N}/norm/{attn,ffn}, weight/norm/final. WebGPU training: FP8→f32 GPU (MATMUL/CE_LOSS/MATMUL_AT/ADAMW)→FP8; scope=embed+lm_head; quality-scaled CE loss. WebGPU inference: Gemma 4 E2B/E4B (GQA RoPE RMSNorm SwiGLU); KV cache in-memory f32. ADR: 2605250004 (training), 2605250005 (inference)."

[subdirs."crates/kotoba-runtime"]
role = "wasm-component-runtime"
tier = "alpha"
notes = "wasmtime 22 Component Model host; WIT world kotoba:kais@0.1.0; WasmExecutor + UdfExecutor. KNOWN BLOCKER: componentize-py 0.23 emits extended-const expressions (i32.add in global initializers); wasmtime 22 disables EXTENDED_CONST by default and has no public Config API to re-enable it — Python WASM guests fail with CompileFailed('constant expression required: non-constant operator: i32.add'). Rust guest (cargo-component) works correctly. Fix: upgrade wasmtime pin in Cargo.toml to '24' and add config.wasm_extended_const(true) in host.rs KotobaEngine::new() — tracked as TODO comment in that function. Rust guest live-verified on Vultr SJC 2026-05-26: assert_quads=1, total_gas_used=30, status=ok."

[subdirs."crates/kotoba-ingest"]
role = "email-ingest"
tier = "alpha"
adr = "90-docs/adr/2605252400-kotoba-gmail-e2e-ingest.md"
notes = "Gmail OAuth2 history-API poll loop + RFC 2822 parse (mail-parser 0.9). EmailIngestor: body → SecureVault (AES-256-GCM blob, prefix kotoba/email-vault/); From/To/Subject → signal:v1: envelope → QuadStore Text. graph_cid = from_bytes('email/inbox/{owner_did}'). email_cid = from_bytes(message_id) or from_bytes(blake3(raw)) — idempotent on Message-ID. 7 predicates: email/message_id(plain), from(enc), to(enc), subject(enc), body_cid(multibase), date(unix ts), thread_id(plain). Gmail env: KOTOBA_GMAIL_{CLIENT_ID,CLIENT_SECRET,REFRESH_TOKEN,OWNER_DID,POLL_INTERVAL_SECS,HISTORY_ID}. Crypto (2026-05-26): KOTOBA_VAULT_KEY raw hex removed — EmailIngestor now takes Arc<dyn AgentCrypto> + Arc<Vault>; gmail_poll_loop(crypto, vault, quad_store) signature; encrypt_blob()/decrypt_blob() opaque via AgentCrypto trait."

[subdirs."crates/kotoba-server"]
role = "xrpc-mcp-server"
tier = "alpha"
notes = "WAL replay on startup via replay_wal() → QuadStore::replay_from_journal() (reads B2 Journal from seq=1, deduplicates by entry CID, applies in seq order). BudgetedBlockStore<MemoryBlockStore> hot + KuboBlockStore cold (Dual-CID, 2026-05-27; S3BlockStore+LayeredBlockStore+IrohBlockStore removed; kotobase pin via IpfsPinClient). kg.delete XRPC (ai.gftd.apps.yata.kg.delete): retracts all entity quads + publishes Journal retract events. KSE Journal/Vault independently use KOTOBA_B2_* via build_kse_store(). Email E2E XRPC: ai.gftd.apps.kotoba.email.{list,read,ingest}; SecureVault (prefix kotoba/email-vault/) via KOTOBA_VAULT_KEY. MCP tools: 15 total — kotoba_quad_create, kotoba_graph_query, kotoba_infer_run, kotoba_embed_create, kotoba_weight_put, kotoba_lora_apply, kotoba_email_list, kotoba_email_read, kotoba_wasm_run, kotoba_datalog_run, kotoba_node_info, kotoba_node_register, kotoba_network_peers, kotoba_graph_gc, kotoba_commit_prune. kotoba_wasm_run: WASM Component Model via WasmPregelRunner; gas_used → Quad gas/consumed_mkoto per agent DID; /mcp route DefaultBodyLimit raised to 50MiB (2026-05-27, was default 2MiB) to accommodate large WASM payloads. kotoba_datalog_run: Datalog eval via evaluate_delta_cited + CitationLedger flush_epoch → royalty_quads → QuadStore. kotoba_graph_gc: mark-sweep GC via gc_dead_blocks(). kotoba_commit_prune: CommitDag::prune_non_head(before_seq) → {pruned, remaining}. CID reconstruction invariant: stored multibase strings must be decoded via KotobaCid::from_multibase(), never from_bytes(str.as_bytes()). PRE proxy (2026-05-26): pre_proxy.rs — PreProxy::reencrypt_for → CACAO-verify → PreKeyRegistry::get_rekey_authed → HPKE-seal; data_key Zeroizing<Vec<u8>>. Security hardening run-5 (2026-05-26): nonce_store.rs NEW — NonceStore(RwLock<HashMap<nonce,expiry_unix>>, MAX_NONCES=16384) check_and_register(); KotobaState.nonce_store; check_read_access gains nonce_store param; nonce registered now+7d after verify; AccessDenied::ReplayedNonce HTTP 401; empty-nonce rejection. SSRF: is_routable_ip() blocks RFC-1918/loopback/link-local before did:web fetch. Payload caps: cacao_b64 8KiB, block.put 32MiB, lora.apply 128MiB, weight.put 512MiB; MCP field MAX_FIELD_LEN=4096. commit.store CACAO auth: check_read_access wired to write path for Private graphs. kotobase_xrpc.rs: require_did_ownership(headers,tenant_did,operator_did) JWT iss check; quota_for_tier(tier)→(quota_pins,quota_bytes)(-1=unlimited); QuotaExceeded HTTP 402. E2E coverage +678 lines: kotobase account lifecycle, pin collision, 5 MCP tools, CACAO roundtrip, weight.get, DID ownership reject, quota enforce. Security hardening run-6 (2026-05-27): (1) attest.claim + attest.challenge require Bearer JWT — attester/challenger DID must match JWT sub or operator_did (HTTP 401 without valid token). (2) kg_ingest + kg_delete + kg_embed require Bearer JWT via require_kg_write_auth() — previously unauthenticated callers could write arbitrary entities into yatabase-kg-v1; any valid JWT sub accepted. (3) Python WASM e2e test (mcp_wasm_run_python_langgraph_agent) added. 5 new kg auth tests. Security hardening run-7 (2026-05-27): (1) require_attester_auth() and require_signal_auth() now call jwt_exp_elapsed() before jwt_sub() — previously expired tokens were accepted if sub matched; 4 expired-token e2e tests added (attest_claim, attest_challenge, signal_register_prekeys, operator_auth). (2) MCP unit test coverage for all 15 tools — embed_create (empty-text guard), infer_run (no-engine/missing-prompt), node_info, node_register, network_peers, wasm_run (missing/invalid-b64), datalog_run (missing-rules/empty-graph), weight_put (ok/missing-layer), lora_apply (ok/missing-rank). (3) Test hardening across 13 crates: kotoba-auth/resolver, kotoba-core/foreign+frame, kotoba-crypto/aead, kotoba-ingest/ivf, kotoba-kse/agent_identity+pre_key_registry, kotoba-net/pregel_msg, kotoba-signal, kotoba-store/block_store+memory_store+tiered_store, kotoba-vm/executor — 901 lines of edge-case and invariant tests. 259 kotoba-server lib tests pass (2026-05-27). Test maturity run (2026-05-27): workspace lib tests 1208→1579 (+371 pure-function unit tests across 34 crates in 8 loop iterations). Coverage added: kotoba-signal (identity/x3dh/group/ratchet/session/store/message), kotoba-crypto (key_wrap/hkdf/hpke/aead/agent_crypto), kotoba-dht (warrant/neighborhood/gossip/node_id/availability_proof), kotoba-net (swarm/transport/gossipsub/protocol/pregel_msg), kotoba-kse (store/secure_vault/sovereign_key/agent_identity/pre_key_registry/sync_window), kotoba-store (block_store/memory_store/tiered_store/capturing_store/budgeted_store), kotoba-vm (executor/wasm_pregel/distributed/auth_actor/state_graph), kotoba-llm (embed/infer_gpu/train), kotoba-runtime (host_state), kotoba-core (foreign/frame/policy). 1579 tests pass (2026-05-27), 0 failures."

[subdirs."crates/kotoba-crypto"]
role = "aead-crypto"
tier = "alpha"
notes = "AES-256-GCM seal/open with OsRng nonce; Zeroizing<Vec<u8>> plaintext on open; seal_with_nonce cfg(test) only (nonce-reuse prevention). Security hardening run-7 (2026-05-27): edge-case tests — seal_open_empty_plaintext (auth-only mode, 28B output), open_data_too_short_returns_error (27B and [] both rejected), successive_seals_use_distinct_nonces (OsRng produces distinct 96-bit nonces), truncated_tag_is_rejected (dropped last auth-tag byte fails open), key_nonce_tag_len_constants, seal_with_nonce_is_deterministic, seal_with_nonce_open_roundtrip, too_short_error_display_contains_threshold, invalid_envelope_error_display, seal_open_large_plaintext (4096B roundtrip), open_only_nonce_no_ciphertext_fails. 68 tests pass (2026-05-27)."

[subdirs."crates/kotoba-store"]
role = "block-store"
tier = "alpha"
notes = "Single-CID redesign 2026-05-27: IrohBlockStore + netwatch-fix-02/03 removed; KuboBlockStore (Kubo HTTP /api/v0/block/{put,get,rm}; Single-CID: blake3 KotobaCid used verbatim via cid-codec=dag-cbor&mhtype=blake3 — no SHA2-256 translation or secondary index) is the sole cold tier. IpfsPinClient (Kubo HTTP RPC: /api/v0/pin/add, pin/rm, pin/ls; KOTOBA_IPFS_ENDPOINT default http://localhost:5001) — kotoba-server acts as its own IPFS node for self-pinning; extended pin >1GB delegated to kotobase.gftd.ai via KOTOBA_PIN_TOKEN (fire-and-forget). BlockStores: MemoryBlockStore (Arc<RwLock<HashMap>>); BudgetedBlockStore<S> LRU eviction wrapper; TieredBlockStore<H,C> hot/cold tiering (hot sync + cold fire-and-forget); CapturingBlockStore (pass-through for CAR bundling); CarBundleWriter / CarBlockIndex (72B header + blocks + 48B/entry index; serialize 3.8 GiB/s; range GET 127ns lookup). object_store removed from kotoba-store; retained in kotoba-kse (Journal/Vault WAL) and kotoba-server (KseStore LocalFileSystem/InMemory init). Loadtest 3 results (2026-05-26 idle, 10M quads, MemoryBlockStore): Phase1: 1M@724K q/s (1919MB RSS), 10M@519K q/s (7038MB RSS). Phase2: insert ~393–635K q/s, commit ~3.5–5.2s/batch, combined 128K q/s in 78.3s."

[subdirs."crates/kotoba-store-web"]
