[knowledge.journal-deprecation]
discovered_on = "2026-06-11"
category      = "architecture-decision"
severity      = "info"
status        = "accepted"
summary       = "KSE Journal DEPRECATED as canonical chain — CommitDag is the single source of truth (founder decision, 2026-06-11)."
details       = """
Decision context: R2b (signed chains for non-repudiation, ADR-sealed-cold-tier)
asked where per-DID accountability chains live.  Answer: the CommitDag, NOT the
Journal.  DistributedDatomCommit already has everything but the signature —
content-addressed, parents: Vec<KotobaCid> hash chain, author DID, IPNS heads
(Ed25519 head-signing already implemented opt-in via ipns_signing_key), and
the audit graph head anchors to Base via audit.anchorPayload.  Building signed
chains on the Journal would duplicate that structure with weaker guarantees
(node-local WAL, not canonical, not anchored).  Therefore the Journal is
deprecated wholesale: no new features on it; its three remaining roles migrate
to CommitDag-based equivalents (startup replay, firehose egress, the ephemeral
double-write in commit_protocol_datoms — KOTOBA_JOURNAL_WAL=off is the opt-out
that becomes the default).  Per-DID chains = CommitDag filtered by author;
equivocation resistance comes from anchoring, not a separate journal.
"""
impact        = "Datomic commit path migrated (2026-06-11): startup WAL replay REMOVED (CommitDag is the durable record), commit_protocol_datoms double-write is ephemeral-only (no block persist), durable replay served by sync.eventsFromCommits. Remaining persistent Journal writers are legacy-only (quad paths journal_assert/assert_datom_compat, relay re-log in net_actor) — no new features on them. New accountability work (R2b commit signatures, access/cacao-cid receipts) targets DistributedDatomCommit."
affects_files = ["crates/kotoba-kse/src/journal.rs", "crates/kotoba-datomic/src/distributed.rs", "crates/kotoba-server/src/xrpc.rs"]
references    = ["ADR-sealed-cold-tier", "ADR-2606112200"]

[knowledge.kubo-block-store-connection-pool]
discovered_on = "2026-05-30"
category      = "optimization"
severity      = "critical"
status        = "resolved"
summary       = "KuboBlockStore connection burst → 318 CLOSE_WAIT + 287 FIN_WAIT2 + 361/min cold-put failures."
details       = """
Original config: reqwest default pool (unbounded) + 500 ms connect_timeout
+ no concurrency cap.  Each ProllyTree builder thread fired hundreds of
parallel block/put requests.  Kubo's HTTP handler leaked CLOSE_WAIT under
burst, the local pool saturated, and every additional put timed out at
500 ms.  Fix combo: `pool_max_idle_per_host = 8`, `connect_timeout = 5 s`,
`pool_idle_timeout = 30 s`, AND an explicit `tokio::sync::Semaphore` with
`KUBO_MAX_INFLIGHT = 16` permits gating put/get.  Result: 361/min ⇒ 0.
"""
impact        = "Production wrote correctly but failed every cold-put burst until F-1f."
resolved_on   = "2026-05-30"
affects_files = ["crates/kotoba-store/src/kubo_store.rs"]
references    = ["F-1f"]

[knowledge.wrapped-vault-key-durable-write-load]
discovered_on = "2026-05-30"
category      = "bug"
severity      = "critical"
status        = "resolved"
summary       = "Wrapped vault key was lost on every pod restart; load_or_genesis fell through to genesis on startup race."
details       = """
1) `TieredBlockStore::put` spawned cold-puts fire-and-forget — the wrapped
   key block could be silently dropped if Kubo wasn't ready yet at genesis.
   Fix: new trait method `put_durable` which `TieredBlockStore` overrides
   to a synchronous cold write + error propagation.  `SovereignCrypto::
   genesis` now retries `put_durable` with exponential backoff (~30 s).
2) Even when the block landed, `load_or_genesis` called `block_store.get`
   once at process start (t ≈ 0.4 s) before Kubo bound localhost:5001;
   the transport error was caught and the path fell through to genesis,
   discarding the existing key.  Fix: symmetric retry helper
   `load_block_durable` with 8 attempts / ~60 s budget.  Only Ok(None)
   from Kubo (block genuinely missing) falls through.
3) `TieredBlockStore::pin/unpin` only touched the hot tier; pin syscall
   never reached Kubo.  Fix: dispatch to both tiers.
4) `KuboBlockStore::pin` was an in-memory HashSet — never issued
   `/api/v0/pin/add`.  Fix: real HTTP pin/add (recursive=false because
   recursive traversal requires valid DAG-CBOR child links).
5) Wrapped key was raw HPKE bytes but put with `cid-codec=dag-cbor`, so
   `pin/add` 500-d with "pin: unexpected content after end of cbor
   object".  Fix: CBOR-wrap the HPKE bytes as `serde_bytes::Bytes` via
   ciborium so the block IS valid DAG-CBOR.
Result: vault key `bafyreic56r2zn…` persisted across 9+ deploys and
multiple pod deletions.
"""
impact        = "Every restart used to lose the vault key — all prior encrypted blobs would have been undecryptable."
resolved_on   = "2026-05-30"
affects_files = [
    "crates/kotoba-kse/src/sovereign_key.rs",
    "crates/kotoba-store/src/tiered_store.rs",
    "crates/kotoba-store/src/kubo_store.rs",
    "crates/kotoba-core/src/store.rs",
]
references    = ["F-1g", "F-1j", "F-1k", "F-1l", "F-1n"]

[knowledge.ipns-head-persistence]
discovered_on = "2026-05-30"
category      = "bug"
severity      = "critical"
status        = "resolved"
summary       = "Graph IPNS heads vanished on every pod restart (InMemoryIpnsRegistry default + Kubo offline=true)."
details       = """
1) `InMemoryIpnsRegistry` was the default — no PVC persistence.  Set
   `KOTOBA_IPNS=kubo` so `KuboIpnsRegistry` (real Kubo /api/v0/name)
   is used.
2) Kubo `name/publish` requires the key alias in the local keystore
   first.  Added auto-keygen retry: on "no key by the given name was
   found", call `generate_ed25519_key(name)` then retry publish.
3) `name/publish?offline=true` skipped the local datastore write on Kubo
   0.34.1 — records vanished on kubo container restart.  Dropped the
   flag so publish persists to repo + DHT.
4) `name/resolve` 500 with body "cannot resolve" was treated as a hard
   error; mapped it to NotFound (alongside the existing "not found" /
   "could not resolve" matches) so callers can treat uninitialised
   heads as fresh-start.
5) Synchronous publish blocked `datomic.transact` for 20 s on DHT
   propagation.  Now: in-memory cache updated synchronously,
   `publish_kubo` runs via `tokio::spawn` + `spawn_blocking`.  Same-pod
   read-after-write still hits the cache; cross-peer propagation is
   eventually-consistent.
"""
impact        = "Without these, `datomic.q` returned 'no distributed Datomic/IPNS head' on every restart; transact took 20 s."
resolved_on   = "2026-05-30"
affects_files = [
    "crates/kotoba-ipfs/src/ipns.rs",
    "deploy/deployment.yaml",
]
references    = ["F-1h", "F-1i", "F-1q"]

[knowledge.deployment-pod-lifecycle]
discovered_on = "2026-05-30"
category      = "optimization"
severity      = "high"
status        = "resolved"
summary       = "Pod startup chowned 350k+ files; stale repo.lock blocked kubo; probes too strict for WAL replay."
details       = """
- `fsGroup = 1000` + `fsGroupChangePolicy = OnRootMismatch` skips the
  per-pod recursive chown of 350 k Kubo block files (12 min ⇒ 36 s).
- kubo sidecar args delete `/data/ipfs/repo.lock` and `/data/ipfs/api`
  (3-retry loop) before `ipfs daemon` so a previous pod's stale lock
  doesn't pin readiness on "someone else has the lock".
- readinessProbe `timeoutSeconds 10 failureThreshold 6
  initialDelaySeconds 10`; livenessProbe `initialDelaySeconds 60
  timeoutSeconds 10 failureThreshold 6`.  WAL replay + IPNS init can
  take 35 s before kotoba binds 8080.
- `resources.requests.memory = 2Gi` / `limits.memory = 8Gi` split so
  the scheduler can place the pod on the heavily-subscribed A16 nodes
  while still permitting wasmtime / Python WASM bursts.
"""
impact        = "Without these, pod restarts cascaded into 12-min crashloops; PVC Multi-Attach + probe failures compounded."
resolved_on   = "2026-05-30"
affects_files = ["deploy/deployment.yaml"]
references    = ["F-1d", "F-1e", "F-1m"]

