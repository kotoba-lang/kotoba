9af9c33d78ce / 331bd9da4bc1 etc.). Operator workflow CLOSED: kotoba init → kotoba serve → kotoba demo → kotoba commit → crash → restart → query. 2026-05-28 sync-back from etzhayyim/kotoba (pulled a5a86740b990 via git subrepo pull): PR#2 README fix — `brew install` requires `--HEAD` flag while formula is HEAD-only (`brew tap etzhayyim/kotoba && brew install --HEAD kotoba`); subrepo pointer 8ada4252e804 → a5a86740b990."

