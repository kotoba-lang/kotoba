notes = "Cranelift JIT + WIT Component Model for multi-language node programs. Upgrade blocker: extended-const proposal disabled by default in wasmtime 22 (no public API to re-enable); needed for componentize-py 0.23 Python WASM guests. Target upgrade: wasmtime 24 + config.wasm_extended_const(true)."

