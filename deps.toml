name = "ai-gftd-project-kotoba"
layer = 5
tier = "alpha"
role = "infrastructure-db"
kind = "rust-workspace"
toolchain = "cargo"
maturity = "design"
workspace = "standalone"
execution_profiles = ["build", "test"]
description = "Kotoba: Content-Addressed Distributed Datalog Database. Datom/EAVT × Pregel BSP × CIDv1 × Datalog on AT Protocol with LLM/weight + WASM Component Model runtime."
language = "rust"

depends_on = [
  "90-docs/adr/2605240001-kotoba-cleanroom-architecture.md",
  "00-contracts/lexicons",
  "90-docs/adr/2605250001-kotoba-selective-sync-storage-budget.md",
  "90-docs/adr/2605250002-kotoba-state-graph-langgraph-api.md",
]

[runtime_dependencies.object_storage]
kind = "blob-store"
provider = "b2"
notes = "Journal Segment SST + Vault blob (FP8 weight tensors)"

[runtime_dependencies.libp2p]
kind = "p2p-transport"
notes = "QUIC + Noise XX + GossipSub + Kademlia DHT"

[runtime_dependencies.agent_gateway]
kind = "llm-bridge"
notes = "CALL_FOREIGN (0xF) → AgentGateway MCP → Vultr A16 pool (ADR-2605211000)"

adr = "90-docs/adr/2605240001-kotoba-cleanroom-architecture.md"

[files."CLAUDE.md"]
role = "project-rules"
flags = ["editable"]

[files."Cargo.toml"]
role = "workspace-manifest"
flags = ["editable"]

[subdirs."crates/kotoba-core"]
role = "cid-frame-prolly"
tier = "alpha"

[subdirs."crates/kotoba-kse"]
role = "stream-engine"
tier = "alpha"

[subdirs."crates/kotoba-kqe"]
role = "query-engine"
tier = "alpha"

[subdirs."crates/kotoba-dht"]
role = "distributed-hash-table"
tier = "alpha"
notes = "append_verified() enforces Ed25519 sig via ciborium signing_bytes; append() is pub(crate) only"

[subdirs."crates/kotoba-net"]
role = "libp2p-network"
tier = "alpha"

[subdirs."crates/kotoba-auth"]
role = "cacao-auth"
tier = "alpha"

[subdirs."crates/kotoba-graph"]
role = "graph-api"
tier = "alpha"

[subdirs."crates/kotoba-vm"]
role = "virtual-machine"
tier = "alpha"
notes = "atomic revert: out_deltas=[] on StepsExceeded; deterministic BSP: inbox + active_ids sorted by CID multibase before each superstep; StateGraph LangGraph-compatible API: StateGraph/CompiledGraph/Thread/Reducer(Override|Append extend)/ToolNode/definition_datoms(); graph_def_cid = shape-only CID (no closures)"

[subdirs."crates/kotoba-llm"]
role = "llm-weight-integration"
tier = "alpha"

[subdirs."crates/kotoba-runtime"]
role = "wasm-component-runtime"
tier = "alpha"
notes = "wasmtime 22 Component Model host; WIT world kotoba:kais@0.1.0; WasmExecutor + UdfExecutor"

[subdirs."crates/kotoba-server"]
role = "xrpc-mcp-server"
tier = "alpha"

[subdirs."crates/kotoba-store"]
role = "block-store"
tier = "alpha"
notes = "MemoryBlockStore + SledBlockStore + S3BlockStore; pin/unpin/delete on all impls; BudgetedBlockStore<S> LRU eviction wrapper"

[subdirs."crates/kotoba-store-web"]
role = "browser-block-store"
tier = "alpha"
notes = "wasm32-only; IdbBlockStore over IndexedDB 2-store schema (blocks/meta); AsyncBlockStore trait; pin-aware LRU evict_cold_async(max_bytes)"

[runtime_dependencies.wasmtime]
kind = "wasm-runtime"
version = "22"
features = ["component-model"]
notes = "Cranelift JIT + WIT Component Model for multi-language node programs"
