[subdirs."crates/kotoba-git"]
role = "git-bridge"
tier = "alpha"
notes = "git ↔ kotoba bridge (ADR-2606015000), byte-exact round-trip. Two layers: (1) lossless anchor — every git object's framed bytes (<type> <size>\\0<body>) stored as a KotobaCid block via put_verified, so the git oid (SHA-1) is always recomputable/verifiable; (2) Datom projection — :git/* schema records the SHA↔CID bridge (:git/oid :db.unique/identity ↔ :git.object/cid #cid) + makes the commit DAG/trees/refs Datalog-queryable. Modules: oid (GitOid SHA-1) / object (byte-exact framed codec for blob/tree/commit/tag, proven vs real git hash-object+cat-file vectors) / schema (:git/* install tx) / datafy (object→tx-data) / pack (pure-Rust pack v2 + idx v2 reader with OBJ_OFS_DELTA+OBJ_REF_DELTA recursive resolution) / lib (GitStore facade put_object/put_ref/materialize_framed/materialize_object + query helpers object_cid/all_objects/commit_parents/log/list_refs/resolve_ref) / repo (disk loose-object reader/writer + import_loose_repo (loose) / import_repo (loose+packed) / export_repo). Deps: kotoba-core/-edn/-datomic/-store + sha1 + flate2 + hex. 27 tests green (24 unit + 1 doc + 2 integration: real git CLI loose+packed repos + real-Datalog query via kotoba_datomic::q), clippy clean. Honest R0: thin packs unsupported (REF_DELTA base must be in-pack); commit parent projection is a set (order preserved only in the lossless block); non-UTF-8 names/messages lossy in projection (lossless in block); sha256-format repos out of R0; layered per ADR-2605312345 (blocks=backend, Datom log=first-class state)."

[subdirs."crates/kotoba-turn"]
role = "turn-relay"
tier = "alpha"
adr = "docs/ADR-turn-relay.md"
notes = "Pure-Rust TURN relay (RFC 8656) for 1:1 real-media WebRTC calls — closes the STUN-only reachability gap behind symmetric NAT (kotoba-rt relays SDP/ICE; browser owns the media plane). Status 2026-06-09: socket-free core DONE + unit-tested (cargo test -p kotoba-turn → 28 passed / 0 failed, pinned to RFC 2202 HMAC-SHA1, RFC 5769 STUN, and CRC-32 check vectors). Modules: lib.rs — ephemeral-credential mint/verify (HMAC-SHA1, coturn use-auth-secret scheme; byte-for-byte shared with the @etzhayyim/kami-engine-sdk JS client's mintTurnCredential/buildIceServers); stun.rs — RFC 8489 20-byte header + attribute TLV (4-byte padding) + XOR-MAPPED-ADDRESS + MESSAGE-INTEGRITY (HMAC-SHA1) + FINGERPRINT (CRC-32), verified vs RFC 5769 §2.2; allocation.rs — 5-tuple allocation state machine, peer permissions, channel bindings, time-based expiry/GC (deterministic: every method takes now=unix-secs, no clock); channel.rs — ChannelData framing (RFC 8656 §12.4, saves 36 B/packet vs Send/Data indications) + STUN/ChannelData demux; server.rs — socket-free request core: classify_datagram (route by first byte) + method classify + authenticate gate before mutating AllocationTable. REMAINING (deferred, integration-tested not unit): the thin async I/O shell — UDP/TCP recv loop + relay-port pool + packet forwarding that drives server.rs + allocation.rs over real sockets. Deps: hmac + sha1 + base64 (+ crc32 for FINGERPRINT). Already in Cargo workspace members."

