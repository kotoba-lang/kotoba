notes = "Gmail OAuth2 history-API poll loop + RFC 2822 parse (mail-parser 0.9). EmailIngestor: body → SecureVault (AES-256-GCM blob, prefix kotoba/email-vault/); From/To/Subject → signal:v1: envelope → QuadStore Text. graph_cid = from_bytes('email/inbox/{owner_did}'). email_cid = from_bytes(message_id) or from_bytes(blake3(raw)) — idempotent on Message-ID. 7 predicates: email/message_id(plain), from(enc), to(enc), subject(enc), body_cid(multibase), date(unix ts), thread_id(plain). Gmail env: KOTOBA_GMAIL_{CLIENT_ID,CLIENT_SECRET,REFRESH_TOKEN,OWNER_DID,POLL_INTERVAL_SECS,HISTORY_ID}. Crypto (2026-05-26): KOTOBA_VAULT_KEY raw hex removed — EmailIngestor now takes Arc<dyn AgentCrypto> + Arc<Vault>; gmail_poll_loop(crypto, vault, quad_store) signature; encrypt_blob()/decrypt_blob() opaque via AgentCrypto trait. Multimodal cross-modal search (2026-05-30, ADR-2605302200): media_embed (MediaEmbedClient trait — HttpMediaEmbedClient CLIP/SigLIP/ImageBind shared-space encoder over HTTP via KOTOBA_MM_EMBED_URL + Blake3MediaEmbedClient caption-bridged deterministic offline client; Modality text/image/audio/video/document from MIME) + media (MediaIngestor → Vault content-addressed blob + media/* datoms [media/mime, media/modality, media/blob, media/size, media/page, media/title, media/caption, media/embed/{model}, media/embed_norm] + media/ivf/* IVF into media:2026:assets named graph; ingest_items/ingest_items_datoms/ingest_paths; rank_by_cosine cross-modal retrieval helper). IvfIndex generalised: to_quads_ns(ns) + namespace-agnostic from_quads/from_datoms (ivf_leaf split) so the same index serves cc/ivf/* and media/ivf/*. 53 ingest lib tests pass. Runnable demo: cargo run --example media_e2e -p kotoba-ingest (text query retrieves image/video/audio/PDF from one shared space, offline)."

[subdirs."crates/kotoba-server"]
role = "xrpc-mcp-server"
tier = "alpha"
notes = "WAL replay on startup via replay_wal() → QuadStore::replay_from_journal() (reads B2 Journal from seq=1, deduplicates by entry CID, applies in seq order). BudgetedBlockStore<MemoryBlockStore> hot + KuboBlockStore cold (Dual-CID, 2026-05-27; S3BlockStore+LayeredBlockStore+IrohBlockStore removed; kotobase pin via IpfsPinClient). kg.delete XRPC (com.etzhayyim.apps.kotobase.kg.delete): retracts all entity quads + publishes Journal retract events. KSE Journal/Vault independently use KOTOBA_B2_* via build_kse_store(). Email E2E XRPC: com.etzhayyim.apps.kotoba.email.{list,read,ingest}; SecureVault (prefix kotoba/email-vault/) via KOTOBA_VAULT_KEY. MCP tools: 17 total — kotoba_quad_create, kotoba_graph_query, kotoba_infer_run, kotoba_embed_create, kotoba_weight_put, kotoba_lora_apply, kotoba_email_list, kotoba_email_read, kotoba_wasm_run, kotoba_datalog_run, kotoba_node_info, kotoba_node_register, kotoba_network_peers, kotoba_graph_gc, kotoba_commit_prune, kotoba_sparql_query, kotoba_multi_hop. Multimodal cross-modal search XRPC (2026-05-30, ADR-2605302200): media_xrpc.rs hosts com.etzhayyim.apps.kotoba.media.{search,ingest,status} — media.search (GET) embeds a TEXT query in the shared space and cosine-ranks all modalities (image/video/audio/document), optional modality filter; media.ingest (POST, 36MiB body limit) accepts base64 assets; media.status (GET) reports asset/embedding/IVF counts + per-modality breakdown; all operator-auth-gated. KotobaState.media_embed_client (Option<Arc<dyn MediaEmbedClient>>, enabled only when KOTOBA_MM_EMBED_URL set; deterministic Blake3 fallback at request time). CLI: kotoba media-search/media-ingest/media-status drive these over HTTP with operator-JWT auth (built from local `kotoba init` identity). Live-verified 2026-05-30: ingested image+video+audio+PDF, text query 'a solo piano…' ranked the audio asset top (score 1.0), modality filter returns only matching modality. kotoba_wasm_run: WASM Component Model via WasmPregelRunner; gas_used → Quad gas/consumed_mkoto per agent DID; /mcp route DefaultBodyLimit raised to 50MiB (2026-05-27, was default 2MiB) to accommodate large WASM payloads. kotoba_datalog_run: Datalog eval via evaluate_delta_cited + CitationLedger flush_epoch → royalty_quads → QuadStore. kotoba_graph_gc: mark-sweep GC via gc_dead_blocks(). kotoba_commit_prune: CommitDag::prune_non_head(before_seq) → {pruned, remaining}. CID reconstruction invariant: stored multibase strings must be decoded via KotobaCid::from_multibase(), never from_bytes(str.as_bytes()). PRE proxy (2026-05-26): pre_proxy.rs — PreProxy::reencrypt_for → CACAO-verify → PreKeyRegistry::get_rekey_authed → HPKE-seal; data_key Zeroizing<Vec<u8>>. Security hardening run-5 (2026-05-26): nonce_store.rs NEW — NonceStore(RwLock<HashMap<nonce,expiry_unix>>, MAX_NONCES=16384) check_and_register(); KotobaState.nonce_store; check_read_access gains nonce_store param; nonce registered now+7d after verify; AccessDenied::ReplayedNonce HTTP 401; empty-nonce rejection. SSRF: is_routable_ip() blocks RFC-1918/loopback/link-local before did:web fetch. Payload caps: cacao_b64 8KiB, block.put 32MiB, lora.apply 128MiB, weight.put 512MiB; MCP field MAX_FIELD_LEN=4096. commit.store CACAO auth: check_read_access wired to write path for Private graphs. kotobase_xrpc.rs: require_did_ownership(headers,tenant_did,operator_did) JWT iss check; quota_for_tier(tier)→(quota_pins,quota_bytes)(-1=unlimited); QuotaExceeded HTTP 402. E2E coverage +678 lines: kotobase account lifecycle, pin collision, 5 MCP tools, CACAO roundtrip, weight.get, DID ownership reject, quota enforce. Security hardening run-6 (2026-05-27): (1) attest.claim + attest.challenge require Bearer JWT — attester/challenger DID must match JWT sub or operator_did (HTTP 401 without valid token). (2) kg_ingest + kg_delete + kg_embed require Bearer JWT via require_kg_write_auth() — previously unauthenticated callers could write arbitrary entities into kotobase-kg-v1; any valid JWT sub accepted. (3) Python WASM e2e test (mcp_wasm_run_python_langgraph_agent) added. 5 new kg auth tests. Security hardening run-7 (2026-05-27): (1) require_attester_auth() and require_signal_auth() now call jwt_exp_elapsed() before jwt_sub() — previously expired tokens were accepted if sub matched; 4 expired-token e2e tests added (attest_claim, attest_challenge, signal_register_prekeys, operator_auth). (2) MCP unit test coverage for all 15 tools — embed_create (empty-text guard), infer_run (no-engine/missing-prompt), node_info, node_register, network_peers, wasm_run (missing/invalid-b64), datalog_run (missing-rules/empty-graph), weight_put (ok/missing-layer), lora_apply (ok/missing-rank). (3) Test hardening across 13 crates: kotoba-auth/resolver, kotoba-core/foreign+frame, kotoba-crypto/aead, kotoba-ingest/ivf, kotoba-kse/agent_identity+pre_key_registry, kotoba-net/pregel_msg, kotoba-signal, kotoba-store/block_store+memory_store+tiered_store, kotoba-vm/executor — 901 lines of edge-case and invariant tests. 269 kotoba-server lib tests pass (2026-05-27). Test maturity run (2026-05-27): workspace lib tests 1208→1579 (+371 pure-function unit tests across 34 crates in 8 loop iterations). Coverage added: kotoba-signal (identity/x3dh/group/ratchet/session/store/message), kotoba-crypto (key_wrap/hkdf/hpke/aead/agent_crypto), kotoba-dht (warrant/neighborhood/gossip/node_id/availability_proof), kotoba-net (swarm/transport/gossipsub/protocol/pregel_msg), kotoba-kse (store/secure_vault/sovereign_key/agent_identity/pre_key_registry/sync_window), kotoba-store (block_store/memory_store/tiered_store/capturing_store/budgeted_store), kotoba-vm (executor/wasm_pregel/distributed/auth_actor/state_graph), kotoba-llm (embed/infer_gpu/train), kotoba-runtime (host_state), kotoba-core (foreign/frame/policy). 1579 tests pass (2026-05-27), 0 failures. Access receipts R1 (2026-06-11, ADR-sealed-cold-tier): access_receipt.rs — every authorized Authenticated/Private read at require_datomic_read* + kotobase.kg.{entity,catalog,search,query} emits receipt datoms (access/graph, access/accessor-did = CACAO leaf iss else JWT sub, access/operation, access/purpose ≤256ch from x-kotoba-purpose header, access/ts-unix) into kotoba/audit/access-receipts/v1 via channel → single background batch writer (KOTOBA_RECEIPT_FLUSH_MS default 1000ms / 256-batch → one commit_protocol_datoms tx per flush; no per-read IPNS races). KOTOBA_REQUIRE_PURPOSE=1 makes x-kotoba-purpose REQUIRED (400) for Private reads (observe-first default off). audit.listReceipts XRPC (operator-gated, graph/accessor filters). Public reads unreceipted; firehose/realtime/git gates = follow-up. R2a (2026-06-11): audit.anchorPayload XRPC (operator-gated) → AnchorBridge.commitRoot calldata for the audit-graph IPNS head (rootHash = low-32 of head CID, batchSize = IPNS seq) via kotoba_evm::anchor; relayer signs+submits (PR #96 boundary). R2b (2026-06-11): DistributedDatomCommit.author_sig — Ed25519 over canonical signed_payload (BTreeMap-sorted index_roots; git-style embedded sig, CID covers it, pre-R2b blocks decode unchanged); DistributedCommitWriter::with_author_signing_key; commit_protocol_datoms signs when author==operator (audit receipts now operator-signed); receipts gain access/cacao-cid (presented CACAO pinned = requester-signed evidence half). R2c: with_import_check merge-path gate (kotoba_auth::commit_import_check — Invalid always rejects; Unsigned/Unverifiable gated by KOTOBA_REQUIRE_SIGNED_COMMITS) + audit.verifyChain XRPC (walk audit CommitDag from IPNS head, per-commit author_sig verdict)."

