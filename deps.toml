notes          = "BlockStore: BudgetedBlockStore<MemoryBlockStore> hot (KOTOBA_HOT_CACHE_BYTES default 256MiB) + KuboBlockStore cold (Single-CID: blake3 KotobaCid stored verbatim via dag-cbor+blake3 multihash — no SHA2-256 translation; KOTOBA_IPFS_ENDPOINT default http://localhost:5001). S3BlockStore + LayeredBlockStore + KotobasePinClient + IrohBlockStore + netwatch-fix-02/03 removed 2026-05-27. Self-pin via IpfsPinClient (Kubo HTTP RPC: /api/v0/pin/add, pin/rm, pin/ls); extended pin >1GB delegated to kotobase.etzhayyim.com (KOTOBA_PIN_TOKEN). KG Arrangement persisted via Journal WAL replay on startup. Agent identity: stable Ed25519+X25519 keypair in K8s Secret kotoba-agent-identity (KOTOBA_AGENT_ED25519_HEX / KOTOBA_AGENT_X25519_HEX / KOTOBA_AGENT_DID); ephemeral fallback if Secret absent. Live verification 2026-05-26: /health ok, 15 MCP tools, kotoba_wasm_run (Rust guest 163KB, assert_quads=1, gas_used=30), kotoba_datalog_run (derived=3 citations=3 royalty_quads=6), stable DID ephemeral=false. MCP tools 17 total (2026-05-27): added kotoba_sparql_query (SPARQL BGP→cold-path router: bound-subject→EAVT, pred+literal→AVET, pred-only→AEVT, bound-object-CID→VAET, 2-triple-join; optional CACAO delegation gate via cacao_b64; sparql max 8KiB) + kotoba_multi_hop (BFS traversal via QuadObject::Cid references across ProllyTree, max_hops≤8, optional CACAO gate). SPARQL executor (2026-05-28): recursive execute_sparql_graph_pattern supports BGP/Filter/Union/LeftJoin/Extend/Join/Group/Path/Minus/Values/OrderBy/Slice/Graph/Distinct/Project + N-triple BGP + HAVING (numeric cmp_values) + GreaterOrEqual/LessOrEqual + CACAO multi-graph delegation (verify_capability_only+authorized_graphs filter) + SUM/MIN/MAX/AVG/Sample/GroupConcat aggregates (numeric cmp_values, i64/f64/string fallback) + Sub-SELECT (Project in JOIN context: left-side subject filter, right-side result) + FILTER EXISTS/NOT EXISTS (semi-join/anti-join on subject set from inner pattern) + property path Alternative(|)/Reverse(^)/ZeroOrOne(?) + SPARQL UPDATE INSERT DATA/DELETE DATA (sparql_update method, 3 tests) + CACAO-authed UPDATE sparql_update_authed (real EdDSA, 3 tests) + SPARQL VALUES inline filter (3 tests) + SPARQL UPDATE MODIFY INSERT/DELETE WHERE (DeleteInsert, instantiate_quad_pattern/instantiate_ground_quad_pattern, variable pos-binding, 2 tests) + SPARQL CONSTRUCT (sparql_construct, triple_pat_to_quad_pattern, 2 tests) + SPARQL ASK + sparql_ask_authed CACAO-gated (4 tests) + BGP routing fix: bound subject+predicate+object correctly filters by all three components (was missing object filter) + SPARQL DESCRIBE + sparql_describe_authed CACAO-gated (5 tests, handles explicit IRI list and ?var WHERE form via string parsing + execute_sparql_graph_pattern, useful for distributed entity profile fetching across IPFS nodes); Phase 10 loadtest (5000 entities) benchmarks captured: DISTINCT p50=188ms, GROUP BY HAVING COUNT p50=131ms, SUM global p50=113ms, MIN/MAX/AVG GROUP BY p50=1.15s, GRAPH ?g 3-graph fan-out p50=269-340ms; 181 kotoba-graph tests pass. 2026-05-28 batch (commits 5cbf-05f5): SPARQL 1.1 SERVICE clause federation (kotoba://graph/<mb> / <cid:mb> / silent forms) + N-hop DESCRIBE multi-pop with parallel try_join_all fetch (tree(4^6) 6-hop 25.6s→11.1s sequential→parallel) + CACAO depth-2 delegation chains (root.aud=leaf.iss attenuation, AttenuationViolation error) + CACAO multi-graph grants (all_graph_cids check) + crash recovery via Journal WAL replay (committed_seq tracks journal_seq not user param; 3 tests) + hot+cold union (hot_covers_all flag; post-replay query merges both layers via dedupe (s,p,o-bytes); applied to get_entity_quads_cold + quads_by_predicate_prefix_cold + lookup_subject_by_po_cold) + Datalog over IPFS (evaluate_datalog_cold scans cold AEVT + hot-union + program.evaluate_delta; CACAO-authed variant) + CID-MV cache for SPARQL (cold_query_sparql_bgp_cached: blake3 of commit+graph+sparql, ciborium Vec<Quad> persisted) + CID-MV cache for Datalog (evalu