role = "key-custody"
tier = "alpha"
notes = "R3a share plane (2026-06-11, ADR-sealed-cold-tier R3): t-of-N Shamir custody of KOTOBA_BLOCK_KEY. split_key(key,t,custodians)→CustodianShare{index, recipient_did, sealed_share=HPKE(ephemeral_pk||nonce||AES-256-GCM via kotoba-crypto), commitment=sha256(share), threshold} — Shamir GF(2^8) via sharks crate (audited, not hand-rolled); open_share verifies commitment (corrupt/substituted share detected); combine_key(t,shares)→Zeroizing<[u8;32]>; t-1 shares = information-theoretic nothing. 8 tests (3-of-5 roundtrip, insufficient-shares, wrong-recipient HPKE, commitment mismatch, randomized dealing, cross-dealing garbage, bad threshold, serde). R3b core (2026-06-11): protocol.rs — KeyShareRequest{graph,cacao_b64,purpose,nonce,requester_x25519_pk}→KeyShareResponse::{Granted(GrantedShare re-wrapped to requester),Denied}; handle_key_share_request calls injected authorize() FIRST (CACAO+purpose+nonce+receipt) then opens+re-wraps share — \"no receipt, no key\" control-flow-enforced; combine_granted(t,grants,requester_sk) recombines client-side; 6 protocol tests (roundtrip, denial-releases-nothing, authorize-runs-first, in-flight-share-requester-only, sub-threshold, serde). libp2p request-response Behaviour = deferred shell (kotoba-turn #102 pattern). R3c = Feldman VSS + MLS-epoch rotation; R3d = MishmarBondEscrow bonds + warrants. Server wiring (2026-06-11): kotoba-server key_share.rs — key.custodianInfo (DID+X25519 pubkey, public), key.depositShare (operator-gated → custody_shares registry), key.requestShare (authorize closure = CACAO datom:read via verify_cacao_graph_operation + purpose policy + access receipt op=key:requestShare, THEN open+re-wrap share to requester); denial leaks no share; e2e full custodian flow (deal to node pubkey → deposit → deny-without-cacao → grant-with-cacao → requester opens re-wrapped share matching the dealt commitment → receipt written). R3c rotation (2026-06-11): CustodianShare gains epoch:u64 + deal_id=sha256(epoch||t||sorted commitments) — binds the polynomial, so combine_key rejects mixed-deal quorums (CustodyError::MixedDealing, closes R3a non-goal); rotate_key/split_key_epoch re-deal to a new custodian set at a new epoch (revocation granularity = epoch); key.depositShare enforces epoch monotonicity (stale dealing → 409), key.requestShare surfaces epoch; pre-R3c shares serde-default to epoch 0. Feldman VSS (detect-at-deal, curve commitments) deferred as R3c-VSS — needs prime-field migration off sharks GF(2^8), audited-crate rule applies. R3d (2026-06-11): custodian warrants. GrantedShare self-describing + operator-Ed25519-signed (grant_signing_payload, R2b seam) = non-repudiable evidence; kotoba_custody::audit_grant cross-checks a signed grant against key:requestShare receipts (Receipted iff same-graph receipt within window, else UnreceiptedRelease); key.reportUnreceiptedRelease verifies grant_sig vs custodian did:key (unsigned→400, bad-sig→not-warranted) then emits a CustodyUnreceiptedRelease (kotoba-dht ValidationRule 8) warrant + pins the grant as evidence; off-chain relayer → MishmarBondEscrow slash (#84). libp2p warrant gossip + on-chain bond/slash = deferred shell. Operator CLI (2026-06-11): kotoba key gen-key (X25519 keypair) / deal (--key-hex/--threshold/--custodian DID:PUBKEY_HEX/--epoch -> t-of-N HPKE-wrapped share JSONs for key.depositShare) / combine (--grant files + --requester-sk-hex -> recombine grants offline) — operable R3 with no single key file."

[subdirs."crates/kotoba-store"]
role = "block-store"
tier = "alpha"
notes = "Single-CID redesign 2026-05-27: IrohBlockStore + netwatch-fix-02/03 removed; KuboBlockStore (Kubo HTTP /api/v0/block/{put,get,rm}; Single-CID: blake3 KotobaCid used verbatim via cid-codec=dag-cbor&mhtype=blake3 — no SHA2-256 translation or secondary index) is the sole cold tier. IpfsPinClient (Kubo HTTP RPC: /api/v0/pin/add, pin/rm, pin/ls; KOTOBA_IPFS_ENDPOINT default http://localhost:5001) — kotoba-server acts as its own IPFS node for self-pinning; extended pin >1GB delegated to kotobase.etzhayyim.com via KOTOBA_PIN_TOKEN (fire-and-forget). BlockStores: MemoryBlockStore (Arc<RwLock<HashMap>>); BudgetedBlockStore<S> LRU eviction wrapper; TieredBlockStore<H,C> hot/cold tiering (hot sync + cold fire-and-forget); CapturingBlockStore (pass-through for CAR bundling); CarBundleWriter / CarBlockIndex (72B header + blocks + 48B/entry index; serialize 3.8 GiB/s; range GET 127ns lookup). object_store removed from kotoba-store; retained in kotoba-kse (Journal/Vault WAL) and kotoba-server (KseStore LocalFileSystem/InMemory init). Loadtest 3 results (2026-05-26 idle, 10M quads, MemoryBlockStore): Phase1: 1M@724K q/s (1919MB RSS), 10M@519K q/s (7038MB RSS). Phase2: insert ~393–635K q/s, commit ~3.5–5.2s/batch, combined 128K q/s in 78.3s. SealedBlockStore<C> (2026-06-11, ADR-2606112200): encrypt-at-rest cold-tier wrapper — KSB1 envelope = magic||nonce||AES-256-GCM(pt, aad='kotoba/sealed-block/v1'), stored under sealed_cid=H(envelope) so Kubo block/put CID-recompute works unchanged; deterministic nonce = HKDF(block_key, 'kotoba/sealed-block/nonce/v1') over plaintext CID (content-addressing ⇒ (key,nonce) collision ⇒ identical pt — no GCM nonce reuse across distinct plaintexts); plaintext→sealed CID index = append-only sealed_index.bin (72B records, torn-tail tolerant) under KOTOBA_STORE_PATH; legacy plaintext fallback on index miss; pins translate to sealed CID (kotobase fanout pins ciphertext). Enabled by KOTOBA_BLOCK_KEY (64-hex) / KOTOBA_BLOCK_KEY_FILE; unset = plaintext + loud 'cold tier UNSEALED' warn. NOT covered: CAR-on-B2 export, KOTOBA_DURABILITY_DHT peer replication, KOTOBA_PEERS cross-node plain-CID fetch (resolved by /kotoba/key/1 stage 2)."

