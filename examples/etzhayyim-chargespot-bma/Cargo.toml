[package]
name        = "etzhayyim-chargespot-bma"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "etzhayyim: Chargespot-type business model — global competitor analysis stored as kotoba Datom projections"

[[bin]]
name = "etzhayyim-chargespot-bma"
path = "src/main.rs"

[dependencies]
kotoba-core.workspace  = true
kotoba-query.workspace   = true
kotoba-store.workspace = true
tokio             = { workspace = true, features = ["rt-multi-thread", "macros"] }
anyhow.workspace  = true
tracing.workspace = true
tracing-subscriber = "0.3"
