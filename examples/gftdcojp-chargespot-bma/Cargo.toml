[package]
name        = "gftdcojp-chargespot-bma"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "gftdcojp: Chargespot-type business model — global competitor analysis stored as kotoba Quads"

[[bin]]
name = "gftdcojp-chargespot-bma"
path = "src/main.rs"

[dependencies]
kotoba-core.workspace  = true
kotoba-kqe.workspace   = true
kotoba-store.workspace = true
tokio             = { workspace = true, features = ["rt-multi-thread", "macros"] }
anyhow.workspace  = true
tracing.workspace = true
tracing-subscriber = "0.3"
