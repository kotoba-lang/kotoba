<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kotoba-shell hello UI</title>
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 18px; background: Canvas; color: CanvasText; }
    h1 { font-size: 20px; margin: 0 0 8px; letter-spacing: 0; }
    p { margin: 6px 0; line-height: 1.45; }
    button { font: inherit; padding: 7px 11px; border-radius: 6px; border: 1px solid color-mix(in srgb, CanvasText 24%, transparent); background: ButtonFace; color: ButtonText; }
    pre { overflow: auto; padding: 10px; border-radius: 6px; background: color-mix(in srgb, CanvasText 7%, transparent); }
  </style>
</head>
<body>
  <h1>kotoba-shell hello UI</h1>
  <p>This file is copied by <code>:ui :build-command</code> into <code>:ui :dist</code> and bundled into the shell.</p>
  <button id="ping">Ping parent bridge</button>
  <pre id="out">idle</pre>
  <script>
    document.getElementById("ping").addEventListener("click", async function () {
      var out = document.getElementById("out");
      try {
        if (!parent || !parent.kotobaShell) throw new Error("parent kotobaShell bridge not found");
        var res = await parent.kotobaShell.invoke("shell/ping", { from: "packaged-ui" });
        out.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        out.textContent = err.message;
      }
    });
  </script>
</body>
</html>
