[package]
name        = "gftdcojp-chargespot-ingest"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "gftdcojp: ingest Chargespot BMA Quads into a running kotoba-server via MCP (Ed25519 CACAO + JWT)"

[[bin]]
name = "gftdcojp-chargespot-ingest"
path = "src/main.rs"

[dependencies]
kotoba-core.workspace  = true
kotoba-kqe.workspace   = true
kotoba-auth            = { path = "../../crates/kotoba-auth" }
ed25519-dalek.workspace = true
rand.workspace         = true
ciborium.workspace     = true
multibase.workspace    = true
base64                 = { version = "0.22" }
serde.workspace        = true
serde_json.workspace   = true
reqwest               = { workspace = true }
tokio                 = { workspace = true, features = ["rt-multi-thread", "macros"] }
anyhow.workspace      = true
tracing.workspace     = true
tracing-subscriber    = "0.3"
