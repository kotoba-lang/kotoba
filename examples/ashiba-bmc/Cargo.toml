[package]
name        = "ashiba-bmc"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "ashiba.etzhayyim.com Lean BMC stored as kotoba Datom projections with Datalog coverage scoring"

[[bin]]
name = "ashiba-bmc"
path = "src/main.rs"

[dependencies]
kotoba-core.workspace  = true
kotoba-kse.workspace   = true
kotoba-kqe.workspace   = true
kotoba-graph.workspace = true
kotoba-store.workspace = true
kotoba-datomic.workspace = true
kotoba-edn.workspace   = true
serde.workspace        = true
serde_json.workspace   = true
bytes.workspace        = true
blake3.workspace       = true
tokio              = { workspace = true, features = ["rt-multi-thread", "macros"] }
anyhow.workspace   = true
tracing.workspace  = true
tracing-subscriber = "0.3"
